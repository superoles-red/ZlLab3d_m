<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Зловещий лабиринт 3D v0.2 — Machine Psalm</title>
  <style>
    :root {
      --bg:#000;
      --panel:#111;
      --panel2:#191919;
      --line:#3b3b3b;
      --text:#e8e8e8;
      --accent:#7fdfff;
      --btn-size:min(13vw, 58px);
      --btn-gap:min(2vw, 10px);
      --joy-size:min(31vw, 138px);
      --joy-knob:min(13vw, 54px);
    }
    html, body {
      margin:0;
      height:100%;
      background:var(--bg);
      overflow:hidden;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
      touch-action:none;
      overscroll-behavior:none;
    }
    body { color:var(--text); }
    #app {
      height:100dvh;
      display:flex;
      flex-direction:column;
      background:#000;
    }
    #screenWrap {
      flex:0 0 67%;
      min-height:0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      padding:6px 0 4px;
      box-sizing:border-box;
      background:#000;
    }
    canvas {
      display:block;
      width:auto;
      height:100%;
      max-width:100%;
      aspect-ratio:3 / 4;
      background:#000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border:1px solid #242424;
      box-shadow:0 0 0 1px #050505 inset;
    }
    #controls {
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
      gap:8px;
      align-items:center;
      padding:8px 10px calc(10px + env(safe-area-inset-bottom));
      box-sizing:border-box;
      background:linear-gradient(180deg, #0c0c0c 0%, #121212 100%);
      border-top:1px solid #202020;
      user-select:none;
      -webkit-user-select:none;
    }
    .controls-side,
    .controls-center {
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-width:0;
    }
    .controls-center {
      padding:0 2px;
    }
    .ctrl-btn {
      appearance:none;
      -webkit-appearance:none;
      border:1px solid var(--line);
      background:linear-gradient(180deg, #232323 0%, #161616 100%);
      color:var(--text);
      min-width:min(24vw, 104px);
      width:min(24vw, 104px);
      height:var(--btn-size);
      border-radius:14px;
      font:600 clamp(13px, 3.5vw, 17px)/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      letter-spacing:.01em;
      box-shadow:0 2px 0 #0a0a0a, inset 0 1px 0 rgba(255,255,255,.06);
      touch-action:none;
      padding:0 8px;
    }
    .ctrl-btn.ctrl-btn-fire {
      height:min(15vw, 66px);
    }
    .ctrl-btn:active,
    .ctrl-btn.is-active {
      transform:translateY(1px);
      background:linear-gradient(180deg, #2e2e2e 0%, #1d1d1d 100%);
      border-color:#5b5b5b;
      color:var(--accent);
      box-shadow:0 1px 0 #0a0a0a, inset 0 1px 0 rgba(255,255,255,.08);
    }
    .joystick-block {
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      min-width:0;
    }
    .joystick-label {
      font:600 clamp(11px, 2.8vw, 13px)/1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:#9aa3aa;
      letter-spacing:.03em;
      text-transform:uppercase;
    }
    .joystick {
      position:relative;
      width:var(--joy-size);
      height:var(--joy-size);
      border-radius:50%;
      touch-action:none;
    }
    .joystick-base {
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.05) 0 35%, transparent 36%),
        radial-gradient(circle at 50% 50%, #222 0%, #131313 72%, #0a0a0a 100%);
      border:1px solid #323232;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05), inset 0 -8px 14px rgba(0,0,0,.42);
    }
    .joystick-knob {
      position:absolute;
      left:50%;
      top:50%;
      width:var(--joy-knob);
      height:var(--joy-knob);
      margin-left:calc(var(--joy-knob) / -2);
      margin-top:calc(var(--joy-knob) / -2);
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #555 0%, #2e2e2e 58%, #191919 100%);
      border:1px solid #4b4b4b;
      box-shadow:0 2px 8px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.08);
      transform:translate(0,0);
      transition:transform .05s linear;
      will-change:transform;
      pointer-events:none;
    }
    .joystick.is-active .joystick-base {
      border-color:#55707e;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06), inset 0 -8px 14px rgba(0,0,0,.42), 0 0 0 1px rgba(127,223,255,.14);
    }
    .joystick.is-active .joystick-knob {
      border-color:#7fdfff;
      box-shadow:0 2px 10px rgba(0,0,0,.48), inset 0 1px 0 rgba(255,255,255,.1), 0 0 10px rgba(127,223,255,.14);
    }
    #nameInput {
      position: fixed; left: -9999px; top: -9999px;
      opacity: 0; pointer-events: none;
    }
    @media (max-width: 390px) {
      :root {
        --joy-size:min(30vw, 126px);
        --joy-knob:min(12vw, 48px);
        --btn-size:min(12vw, 52px);
      }
      #screenWrap { flex-basis:66%; }
      #controls { gap:6px; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); }
      .ctrl-btn { min-width:min(23vw, 96px); width:min(23vw, 96px); }
    }
    @media (max-height: 760px) {
      #screenWrap { flex-basis:64%; }
      :root { --joy-size:min(28vw, 118px); --joy-knob:min(11vw, 44px); }
    }
  
/* clean mobile layout */
#screenWrap{
  flex:0 0 70% !important;
  padding:0 !important;
}
canvas{
  width:min(100vw, calc(100dvh * 3 / 4)) !important;
  height:auto !important;
  max-width:100vw !important;
  aspect-ratio:3 / 4 !important;
  border:none !important;
  box-shadow:none !important;
}
#controls{
  padding:8px 8px calc(8px + env(safe-area-inset-bottom)) !important;
  gap:8px !important;
  align-items:end !important;
}
.controls-left,
.controls-right{
  padding-bottom:10px !important;
}
.controls-center{
  padding-bottom:8px !important;
}
.ctrl-btn-menu{
  width:34px !important;
  min-width:34px !important;
  height:24px !important;
  border-radius:10px !important;
  padding:0 !important;
  font-size:11px !important;
}
#lookStick .joystick-base{
  background:
    linear-gradient(to bottom,
      rgba(200,40,40,0.55) 0%,
      rgba(200,40,40,0.55) 45%,
      rgba(0,0,0,0) 46%,
      rgba(0,0,0,0) 54%,
      rgba(40,180,70,0.55) 55%,
      rgba(40,180,70,0.55) 100%
    ),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.05) 0 35%, transparent 36%),
    radial-gradient(circle at 50% 50%, #222 0%, #131313 72%, #0a0a0a 100%) !important;
}
#lookStick.is-shooting .joystick-base{
  box-shadow:0 0 0 2px rgba(255,70,70,0.35) inset, 0 0 12px rgba(255,60,60,0.25);
}
#lookStick.is-running .joystick-base{
  box-shadow:0 0 0 2px rgba(70,220,90,0.35) inset, 0 0 12px rgba(70,220,90,0.25);
}


/* ===== Right stick visual: rounded cross (D‑pad style) ===== */
#lookStick{
  position:relative;
}
#lookStick .joystick-base{
  background:none !important;
  border:none !important;
  box-shadow:none !important;
}
#lookStick::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22%;
  background:
    linear-gradient(#3a3a3a,#1a1a1a);
  mask:
    linear-gradient(#000 0 0) center/36% 100% no-repeat,
    linear-gradient(#000 0 0) center/100% 36% no-repeat;
  -webkit-mask:
    linear-gradient(#000 0 0) center/36% 100% no-repeat,
    linear-gradient(#000 0 0) center/100% 36% no-repeat;
}

/* color zones for actions */
#lookStick.is-shooting::before{
  background:linear-gradient(#7a0000,#2a0000);
}
#lookStick.is-running::before{
  background:linear-gradient(#0f6a22,#063b13);
}

/* keep knob visible above cross */
#lookStick .joystick-knob{
  z-index:2;
}

</style>
</head>
<body>
<div id="app">
  <div id="screenWrap">
    <canvas id="c"></canvas>
  </div>
  <div id="controls" aria-label="Управление">
    <div class="controls-side controls-left">
      <div class="joystick-block">
        <div class="joystick" id="moveStick" aria-label="Джойстик движения">
          <div class="joystick-base"></div>
          <div class="joystick-knob"></div>
        </div>
      </div>
    </div>
    <div class="controls-center">
      <button class="ctrl-btn ctrl-btn-menu" data-key="pause">≡</button>
    </div>
    <div class="controls-side controls-right">
      <div class="joystick-block">
        <div class="joystick" id="lookStick" aria-label="Джойстик поворота">
          <div class="joystick-base"></div>
          <div class="joystick-knob"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<input id="nameInput" maxlength="5" />
<script>

(() => {
  "use strict";

  /********************************************************************
   *  Зловещий лабиринт 3D — Machine Psalm (Raycast FPS, HTML5 Canvas)
   *  ВНИМАНИЕ: это один файл. Сохрани как .html и открой в Chrome.
   *
   *  Управление:
   *   - WASD / ФЫВЦ — движение
   *   - Стрелки: ↑/↓ вперёд/назад, ←/→ поворот
   *   - Alt + ←/→ — стрейф
   *   - Shift — бег
   *   - Пробел или ЛКМ — выстрел / старт из меню
   *   - Enter — пауза
   *   - C (англ) / С (рус) — рекорды (только в меню)
   ********************************************************************/

  /***********************
   *  Настройки рендера
   ***********************/
  const canvas = document.getElementById("c");
  const screenWrap = document.getElementById("screenWrap");
  const ctx = canvas.getContext("2d", { alpha: false });
  // Рендерим в низком разрешении для ретро-пикселей, затем масштабируем.
  const RENDER_W = 180;
  const RENDER_H = 240;
  const view = document.createElement("canvas");
  view.width = RENDER_W;
  view.height = RENDER_H;
  const vctx = view.getContext("2d", { alpha: false });
  vctx.imageSmoothingEnabled = false;

  // Глобальный z-buffer текущего кадра (для частичной окклюзии спрайтов за углами)
  let zBuf = null;


  function resize() {
    const rect = screenWrap.getBoundingClientRect();
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    const targetAspect = RENDER_W / RENDER_H;
    let cssW = rect.width;
    let cssH = rect.height;
    if (cssW / cssH > targetAspect) cssW = cssH * targetAspect;
    else cssH = cssW / targetAspect;
    canvas.style.width = `${Math.floor(cssW)}px`;
    canvas.style.height = `${Math.floor(cssH)}px`;
    canvas.width = Math.max(1, Math.floor(cssW * dpr));
    canvas.height = Math.max(1, Math.floor(cssH * dpr));
    ctx.imageSmoothingEnabled = false;
  }
  window.addEventListener("resize", resize);
  resize();

  /***********************
   *  Константы игры
   ***********************/
  const STATE = {
    MENU: "MENU",
    PLAYING: "PLAYING",
    PAUSED: "PAUSED",
    SCOREBOARD: "SCOREBOARD",        // оверлей поверх меню
    GAMEOVER_ENTRY: "GAMEOVER_ENTRY" // красный экран + ввод имени
  };

  const MAP_W = 20, MAP_H = 20;

  // Представление клетки:
  // 0 — пусто
  // 1 — обычная стена
  // 2 — разрушаемая стена
  const TILE = { EMPTY:0, WALL:1, BREAK:2 };

  // ===== Fixed level templates (20x20) =====
  // Legend:
  //   # = indestructible wall
  //   . = empty
  //   P = always breakable wall (pink)
  //   O = random wall/breakable (orange) 50/50 each level start
  //   C = random empty/breakable (cyan) 50/50 each level start
  //   E = enemy spawner (red)
  //   I = item spawner (green)
  //   S = player spawn (blue)
  const LEVEL1_LAYOUT = [
    "####################",
    "#IO...E..ICS..E...I#",
    "#.##P###O###P###C#O#",
    "#.C..S........E..#S#",
    "#.#.###E#O#IE###.P.#",
    "#E#.OI#O#I#C##IO.#.#",
    "#.#.#.........S#E#E#",
    "#.P.#E.E##O#E.EO.#.#",
    "#.#.##.##EI##.##.O.#",
    "#.#.IP.CS..E#.#E.#I#",
    "#I#.E#.#E..SC.PI.#.#",
    "#.O.##.##IE##.##.#.#",
    "#.#.OE.E#O##E.E#.P.#",
    "#E#E#S.........#.#.#",
    "#.#.OI##C#I#O#IO.#E#",
    "#.P.###EI#O#E###.#.#",
    "#S#..E........S..C.#",
    "#O#C###P###O###P##.#",
    "#I...E..SCI..E...OI#",
    "####################",
  ];

  const LEVEL2_LAYOUT = [
    "####################",
    "#S..I....EPE...IS.E#",
    "#.E#C###..C..O####P#",
    "##O#.OE.......EOE#I#",
    "#..#.####.IC####.#.#",
    "#..#..SEO......I.CS#",
    "#.IO..####P###O#E#.#",
    "#.###.IOE..E#EI#P#.#",
    "#..E#..#.#..S.....E#",
    "#..IO.O#.###O##O##P#",
    "#P###.E#ICE.I..SICE#",
    "#.EC..##.###P#...#.#",
    "#..#...S..E#E..#E#.#",
    "#.E#P.#P#O.#.###O#.#",
    "#I##I.....EO..I..CI#",
    "#..O...#I####.OE.#.#",
    "#.E#E#C#E....I##P#S#",
    "#.O###.###C##O#E.#.#",
    "#S....IOE...S...IPE#",
    "####################",
  ];

  const LEVEL3_LAYOUT = [
    "####################",
    "#S.I....E...S.I...E#",
    "#.##C#.##O#P#.#P##.#",
    "#.P.EO.#E.SIO.OI.C.#",
    "#E####E#P#C##E##P#I#",
    "#....S.....S.......#",
    "#.##P#.#O#.#P###O#E#",
    "#.I.E#I#E#E#E.OE.C.#",
    "#.##.#O#.#C#..#.I#I#",
    "#..C..SI.....I...S.#",
    "#.I###O#.E#O##O#C#.#",
    "#..EP..##P#E....EO.#",
    "#E#O#E....S.###O##E#",
    "#..E###I#E....I....#",
    "#.......#.##O#C#O#I#",
    "#I#O###E#.P..I.E...#",
    "#....I....#E.##O#E.#",
    "#.##C##O#I#O##.E#C.#",
    "#S.E......E.SI....E#",
    "####################",
  ];

  let levelOrder = [0,1,2];
  let currentLevelSetIndex = 0;
  const ALL_LEVEL_LAYOUTS = [LEVEL1_LAYOUT, LEVEL2_LAYOUT, LEVEL3_LAYOUT];

  let enemySpawnerCells = [];
  let itemSpawnerCells  = [];
  let playerSpawnCells  = [];


  const PLAYER_MAX_HP = 5;
    const HIT_STUN_TIME = 0.22; // sec: stun during knockback
const PLAYER_FIRE_COOLDOWN = 0.2; // 5 выстр/сек
  const PLAYER_BASE_SPEED = 2.4;    // клеток/сек (примерно)
  const PLAYER_RUN_MULT = 1.45;
  const MAX_ENEMY_SPEED = PLAYER_BASE_SPEED * PLAYER_RUN_MULT; // враги и босс не могут быть быстрее игрока в беге

  const ENEMY_RESPAWN_DELAY = 5.0;
  const WALL_RESTORE_DELAY = 5.0;

  // LOS и правила "не на глазах"
  const LOS_LIMIT = 12;             // клеток
  const SPAWN_MIN_DIST = 5;         // клеток
  // Безопасный радиус вокруг игрока при любом появлении (новая игра / новый уровень / возрождение)
  const PLAYER_SAFE_SPAWN_RADIUS = 6;   // клеток: враги не должны "появляться" ближе этого радиуса
  // Отложенный спавн врагов, которые оказались слишком близко к месту возрождения игрока
  const deferredEnemySpawns = [];       // {type, cx, cy}
  let spawnProtectionMode = false; // true immediately after player spawn to defer close spawns

  // Анти-фарм одного спаунера:
  // если игрок 2 раза подряд убил врага с одного и того же спаунера,
  // этот спаунер замораживается, пока не будет убит враг с другого спаунера.
  let lastKilledEnemySpawner = null;     // "x,y"
  let frozenEnemySpawnerKey = null;      // "x,y" | null

  const ITEM_RESPAWN_DELAY = 5.0;
  // Дистанции активации/попаданий (в клетках)
  const ENEMY_AGGRO_RANGE = 6;      // враг активируется и "видит" игрока только до 6 клеток
  const PLAYER_SHOT_RANGE = 6;      // выстрел игрока достаёт только до 6 клеток
  const ENEMY_SHOT_RANGE = 7;       // снаряд врага летит максимум 7 клеток


  // Враги на карте
  const TARGET_MELEE = 5;  // монах с ножом
  const TARGET_SHOOT = 5;  // монах с ракетницей
  const MAX_BOSS = 1;

  // Стрельба врагов
  const SHOOTER_INTERVAL = 1.0;     // монах с ракетницей
  const BOSS_INTERVAL = 0.5;        // босс стреляет чаще

  // Время усилений
  const POWERUP_DURATION = 10.0;

  // Предметы на карте
  const FIX_MEDKIT = 5;
  const FIX_SUPER = 1;
  const FIX_BOOTS = 1;
  const FIX_DAMAGE = 1;
  const FIX_WINGS = 1;

  // Подбор
  const PICKUP_RADIUS = 0.95; // клеток (слегка увеличенный)
  const ITEM_FADE_START = 1.25; // с этой дистанции начинаем плавно "растворять" предмет

  // Разрушаемые стены
  const BREAKABLE_COUNT = 20;

  // Босс
  const BOSS_SENSE_RADIUS = 9999; // босс «чует» игрока на любом расстоянии
  const BOSS_SOUND_RADIUS = 9999; // слышно всегда, громкость зависит от дистанции

  // Эмбиент
  const AMBIENT_EVENT_MIN = 6;
  const AMBIENT_EVENT_MAX = 14;

  /***********************
   *  Утилиты
   ***********************/
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a,b,t) => a + (b-a)*t;
  const rand = (a,b) => a + Math.random()*(b-a);
  const randi = (a,b) => Math.floor(rand(a,b+1));
  
  // Простое «думовское» затемнение по дальности (фонарик):
  // 0..5 клеток — постепенно темнеет (параболически), 6-я и дальше — полная тьма.
  const LIGHT_CELLS = 5;
  const FULL_DARK_CELL = 6;
  const LIGHT_CURVE_AT_5 = 0.85;     // насколько темно на 5 клетках (0..1)
  const MAX_DARK_ALPHA = 0.92;       // максимальная плотность затемнения (0..1)

  function darknessByDist(d) {
    if (d >= FULL_DARK_CELL) return 1;
    const t = clamp(d / LIGHT_CELLS, 0, 1);
    // парабола: плавно в начале, резче ближе к дальним клеткам
    return (t * t) * LIGHT_CURVE_AT_5;
  }

const dist2 = (ax,ay,bx,by) => {
    const dx=ax-bx, dy=ay-by;
    return dx*dx+dy*dy;
  };
  const dist = (ax,ay,bx,by) => Math.sqrt(dist2(ax,ay,bx,by));
  const wrapAngle = (a) => {
    while (a < -Math.PI) a += Math.PI*2;
    while (a >  Math.PI) a -= Math.PI*2;
    return a;
  };

  function keyToLower(k) {
    // Нормализуем рус/англ для C/С, WASD/ФЫВЦ и т.п.
    return (k || "").toLowerCase();
  }

  /***********************
   *  Звук (WebAudio)
   ***********************/
  let audioCtx = null;
  let masterGain = null;
  let sfxGain = null;
  let ambGain = null;
  let ambientNextAt = 0;

  const MASTER_VOL = 0.8;
  let audioPaused = false;

  function setAudioPaused(paused) {
    audioPaused = !!paused;
    if (!audioCtx || !masterGain) return;
    const t = audioCtx.currentTime;
    // Быстрое затухание/возврат без щелчков
    const target = audioPaused ? 0.0001 : MASTER_VOL;
    masterGain.gain.setTargetAtTime(target, t, 0.04);
  }


  function ensureAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    sfxGain = audioCtx.createGain();
    ambGain = audioCtx.createGain();
    masterGain.gain.value = MASTER_VOL;
    sfxGain.gain.value = 0.8;
    ambGain.gain.value = 0.25;
    sfxGain.connect(masterGain);
    ambGain.connect(masterGain);
    masterGain.connect(audioCtx.destination);
  }

  function nowA() { return audioCtx ? audioCtx.currentTime : 0; }

  function playTone({ freq=220, type="sine", dur=0.12, gain=0.2, detune=0, ramp=0.02, toAmb=false }) {
    if (!audioCtx) return;
    const t0 = nowA();
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + ramp);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g);
    g.connect(toAmb ? ambGain : sfxGain);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  function noiseBuffer(seconds=0.2) {
    if (!audioCtx) return null;
    const sr = audioCtx.sampleRate;
    const buf = audioCtx.createBuffer(1, Math.floor(sr*seconds), sr);
    const data = buf.getChannelData(0);
    for (let i=0;i<data.length;i++) data[i] = (Math.random()*2-1);
    return buf;
  }

  function playNoise({ dur=0.15, gain=0.15, hp=300, lp=5000, toAmb=false }) {
    if (!audioCtx) return;
    const t0 = nowA();
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(dur);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const hpf = audioCtx.createBiquadFilter(); hpf.type="highpass"; hpf.frequency.value=hp;
    const lpf = audioCtx.createBiquadFilter(); lpf.type="lowpass";  lpf.frequency.value=lp;
    src.connect(hpf); hpf.connect(lpf); lpf.connect(g);
    g.connect(toAmb ? ambGain : sfxGain);
    src.start(t0);
    src.stop(t0 + dur + 0.02);
  }

  function scheduleAmbient(t) {
    // раз в 6–14 сек случайный «подземный» элемент (тихо)
    ambientNextAt = t + rand(AMBIENT_EVENT_MIN, AMBIENT_EVENT_MAX);
  }

  function tickAmbient(t, playing) {
    if (!audioCtx) return;
    // постоянный очень тихий гул (реализация: редкий подмешиваемый шум)
    if (playing) {
      // лёгкий фоновый «ветер»
      if (t >= ambientNextAt) {
        const pick = Math.random();
        if (pick < 0.33) {
          // капля
          playTone({freq:rand(420,700),type:"sine",dur:0.06,gain:0.03,toAmb:true});
        } else if (pick < 0.66) {
          // скрип/металл
          playTone({freq:rand(120,220),type:"triangle",dur:0.22,gain:0.03,toAmb:true,detune:rand(-30,30)});
        } else {
          // глухой удар
          playNoise({dur:0.12,gain:0.03,hp:80,lp:900,toAmb:true});
        }
        scheduleAmbient(t);
      }
    } else {
      scheduleAmbient(t);
    }
  }
  // Характерный звук босса (как раньше): слышно всегда, меняется по дистанции.
  // Реализовано как непрерывный дрон из 2 осцилляторов + фильтр.
  let bossDrone = null; // {osc1, osc2, gain, filt}
  function stopBossDrone() {
    if (!bossDrone) return;
    try { bossDrone.osc1.stop(); } catch(e){}
    try { bossDrone.osc2.stop(); } catch(e){}
    try { bossDrone.gain.disconnect(); } catch(e){}
    bossDrone = null;
  }
  function ensureBossDrone() {
    if (!audioCtx || bossDrone) return;
    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const filt = audioCtx.createBiquadFilter();
    const gain = audioCtx.createGain();
    osc1.type = "sawtooth";
    osc2.type = "sine";
    osc1.frequency.value = 62;
    osc2.frequency.value = 39;
    filt.type = "lowpass";
    filt.frequency.value = 520;
    gain.gain.value = 0.0;
    osc1.connect(filt);
    osc2.connect(filt);
    filt.connect(gain);
    gain.connect(masterGain);
    osc1.start();
    osc2.start();
    bossDrone = { osc1, osc2, gain, filt };
  }
  function updateBossDrone(dCells) {
    // Если мы не в игре (меню/ввод рекордов/смерть), дрон босса не должен жить.
    if (gameState !== STATE.PLAYING && gameState !== STATE.PAUSED) { stopBossDrone(); return; }

    if (!audioCtx) return;
    ensureBossDrone();
    if (!bossDrone) return;
    const alive = (boss && !boss.dead) ? 1 : 0;
    // всегда слышно: минимум + рост при приближении
    const t = 1 / (1 + (dCells / 6));
    const vol = lerp(0.018, 0.11, clamp(t,0,1));
    const target = vol * alive;
    bossDrone.gain.gain.setTargetAtTime(target, audioCtx.currentTime, 0.08);
    // лёгкое "дыхание" по частоте
    if (alive) {
      bossDrone.osc1.frequency.setTargetAtTime(lerp(56, 72, t), audioCtx.currentTime, 0.12);
      bossDrone.osc2.frequency.setTargetAtTime(lerp(34, 46, t), audioCtx.currentTime, 0.12);
      bossDrone.filt.frequency.setTargetAtTime(lerp(420, 760, t), audioCtx.currentTime, 0.15);
    }
  }

function playBossPresenceSoundByDistance(dCells) {
    if (!audioCtx) return;
    if (dCells > BOSS_SOUND_RADIUS) return;
    // «сломанный робот»: короткие прерывистые писки/шумы
    const gain = lerp(0.00, 0.06, 1 - clamp(dCells / BOSS_SOUND_RADIUS, 0, 1));
    if (Math.random() < 0.08) {
      playNoise({dur:0.06,gain:gain,hp:200,lp:1800,toAmb:false});
      playTone({freq:rand(90,160),type:"square",dur:0.05,gain:gain});
    }
  }

  // Для ретро: делаем очень простые паттерны на маленьком тайле.
  const TEX_SIZE = 32;
  function makeTexture(drawFn) {
    const c = document.createElement("canvas");
    c.width = TEX_SIZE; c.height = TEX_SIZE;
    const g = c.getContext("2d");
    g.imageSmoothingEnabled = false;
    drawFn(g);
    return c;
  }

  function colorSetForLevel() {
    // приглушённые естественные диапазоны
    const pickWall = randi(0,3);
    const palettes = [
      // кирпич
      { name:"brick",
        base:[randi(70,120), randi(35,55), randi(25,40)],
        hi:[randi(120,160), randi(55,75), randi(35,55)]
      },
      // металл
      { name:"metal",
        base:[randi(55,80), randi(55,80), randi(60,90)],
        hi:[randi(110,140), randi(110,140), randi(120,150)],
        rust:[randi(110,150), randi(60,90), randi(30,45)]
      },
      // камень
      { name:"stone",
        base:[randi(45,70), randi(50,75), randi(55,85)],
        hi:[randi(90,120), randi(95,125), randi(105,135)]
      },
      // грунт
      { name:"dirt",
        base:[randi(55,90), randi(40,70), randi(25,45)],
        hi:[randi(95,125), randi(80,110), randi(55,75)]
      }
    ];
    const p = palettes[pickWall];

    const floorPick = randi(0,2);
    const floorPals = [
      { name:"floorStone", base:[randi(35,60), randi(40,65), randi(45,70)], hi:[randi(75,100), randi(80,105), randi(85,110)] },
      { name:"floorMetal", base:[randi(45,65), randi(45,65), randi(50,75)], hi:[randi(90,120), randi(90,120), randi(100,130)] },
      { name:"floorDirt",  base:[randi(45,75), randi(35,60), randi(20,40)], hi:[randi(80,110), randi(65,95), randi(40,60)] },
    ];
    const f = floorPals[floorPick];

    const ceilPick = randi(0,2);
    const c = floorPals[ceilPick];

    return { wall:p, floor:f, ceil:c };
  }

  function rgb(a) { return `rgb(${a[0]},${a[1]},${a[2]})`; }
  function darker(a, k=0.75) { return [Math.floor(a[0]*k), Math.floor(a[1]*k), Math.floor(a[2]*k)]; }
  function lighter(a, k=1.12) { return [clamp(Math.floor(a[0]*k),0,255), clamp(Math.floor(a[1]*k),0,255), clamp(Math.floor(a[2]*k),0,255)]; }

  function buildTextures(pal) {
    // обычная стена
    const wall = makeTexture((g) => {
      g.fillStyle = rgb(darker(pal.wall.base, 0.55));
      g.fillRect(0,0,TEX_SIZE,TEX_SIZE);
      g.fillStyle = rgb(pal.wall.base);
      if (pal.wall.name === "brick") {
        // кирпичики
        for (let y=2; y<TEX_SIZE; y+=8) {
          const offset = (Math.floor(y/8)%2)*4;
          for (let x=-offset; x<TEX_SIZE; x+=8) {
            g.fillRect(x+1,y,7,5);
          }
        }
        g.fillStyle = "rgba(0,0,0,0.25)";
        for (let y=2; y<TEX_SIZE; y+=8) g.fillRect(0,y+6,TEX_SIZE,1);
      } else if (pal.wall.name === "metal") {
        // плиты
        g.fillStyle = rgb(pal.wall.base);
        for (let y=0; y<TEX_SIZE; y+=16) {
          for (let x=0; x<TEX_SIZE; x+=16) {
            g.fillRect(x+1,y+1,14,14);
            g.fillStyle = rgb(lighter(pal.wall.base,1.25));
            g.fillRect(x+2,y+2,12,1);
            g.fillStyle = rgb(pal.wall.base);
          }
        }
        // ржавчина
        if (pal.wall.rust) {
          g.fillStyle = `rgba(${pal.wall.rust[0]},${pal.wall.rust[1]},${pal.wall.rust[2]},0.35)`;
          for (let i=0;i<28;i++){
            g.fillRect(randi(0,31), randi(0,31), randi(1,3), randi(1,3));
          }
        }
      } else if (pal.wall.name === "stone") {
        // камни
        for (let i=0;i<22;i++){
          const x=randi(0,31), y=randi(0,31), w=randi(6,12), h=randi(4,10);
          g.fillStyle = rgb([pal.wall.base[0]+randi(-10,10), pal.wall.base[1]+randi(-10,10), pal.wall.base[2]+randi(-10,10)]);
          g.fillRect(x,y,w,h);
        }
        g.fillStyle = "rgba(0,0,0,0.25)";
        for (let i=0;i<20;i++) g.fillRect(randi(0,31),randi(0,31),randi(1,2),randi(1,2));
      } else { // dirt
        for (let i=0;i<50;i++){
          g.fillStyle = rgb([pal.wall.base[0]+randi(-15,15), pal.wall.base[1]+randi(-15,15), pal.wall.base[2]+randi(-15,15)]);
          g.fillRect(randi(0,31), randi(0,31), randi(1,3), randi(1,3));
        }
      }
      // лёгкая тень сверху
      g.fillStyle="rgba(0,0,0,0.20)";
      g.fillRect(0,0,TEX_SIZE,3);
    });

    // разрушаемая стена — отчётливо отличается трещинами/светлее
    const breakWall = makeTexture((g) => {
      g.drawImage(wall,0,0);
      // накладываем «трещины»
      g.fillStyle = "rgba(255,255,255,0.10)";
      for (let i=0;i<14;i++){
        g.fillRect(randi(0,31), randi(0,31), 1, randi(6,16));
      }
      g.fillStyle = "rgba(0,0,0,0.35)";
      for (let i=0;i<10;i++){
        g.fillRect(randi(0,31), randi(0,31), randi(2,5), 1);
      }
      // маленькая «метка»
      g.fillStyle = "rgba(255,255,255,0.12)";
      g.fillRect(2,2,6,6);
    });

    const floor = makeTexture((g) => {
      g.fillStyle = rgb(darker(pal.floor.base,0.6)); g.fillRect(0,0,TEX_SIZE,TEX_SIZE);
      g.fillStyle = rgb(pal.floor.base);
      for (let i=0;i<55;i++){
        g.fillRect(randi(0,31), randi(0,31), randi(1,3), randi(1,3));
      }
      g.fillStyle = "rgba(0,0,0,0.25)";
      for (let i=0;i<20;i++) g.fillRect(randi(0,31),randi(0,31),1,1);
    });

    const ceil = makeTexture((g) => {
      g.fillStyle = rgb(darker(pal.ceil.base,0.55)); g.fillRect(0,0,TEX_SIZE,TEX_SIZE);
      g.fillStyle = rgb(pal.ceil.base);
      for (let x=0;x<TEX_SIZE;x+=4){
        g.fillRect(x, randi(0,31), 1, randi(6,16));
      }
      g.fillStyle="rgba(0,0,0,0.22)";
      g.fillRect(0,0,TEX_SIZE,4);
    });

    return { wall, breakWall, floor, ceil };
  }

  function initMap() {
    // Build current map from shuffled level order for this run

  function buildLevelFromLayout(layout) {
    map = Array.from({length:MAP_H}, ()=>Array(MAP_W).fill(TILE.WALL));
    wallStates = Array.from({length:MAP_H}, ()=>Array.from({length:MAP_W}, ()=>({
      destroyed:false, destroyAnim:0, restoreAt:0, pendingRestore:false
    })));

    enemySpawnerCells.length = 0;
    itemSpawnerCells.length  = 0;
    playerSpawnCells.length  = 0;

    const orangeCells = [];
    const cyanCells = [];

    for (let y=0; y<MAP_H; y++){
      const row = layout[y] || "";
      for (let x=0; x<MAP_W; x++){
        const ch = row[x] || '#';
        if (ch === '#') {
          map[y][x] = TILE.WALL;
        } else if (ch === '.') {
          map[y][x] = TILE.EMPTY;
        } else if (ch === 'P') {
          map[y][x] = TILE.BREAK;
        } else if (ch === 'O') {
          // randomized later: WALL or BREAK
          map[y][x] = TILE.WALL;
          orangeCells.push({x,y});
        } else if (ch === 'C') {
          // randomized later: EMPTY or BREAK
          map[y][x] = TILE.EMPTY;
          cyanCells.push({x,y});
        } else if (ch === 'E') {
          map[y][x] = TILE.EMPTY;
          enemySpawnerCells.push({x,y});
        } else if (ch === 'I') {
          map[y][x] = TILE.EMPTY;
          itemSpawnerCells.push({x,y});
        } else if (ch === 'S') {
          map[y][x] = TILE.EMPTY;
          playerSpawnCells.push({x,y});
        } else {
          // unknown -> wall
          map[y][x] = TILE.WALL;
        }
      }
    }

    function shuffle(a){
      for (let i=a.length-1;i>0;i--){
        const j = (Math.random()*(i+1))|0;
        const t=a[i]; a[i]=a[j]; a[j]=t;
      }
    }

    // Orange: half BREAK, half WALL
    shuffle(orangeCells);
    const halfO = Math.floor(orangeCells.length/2);
    for (let i=0;i<orangeCells.length;i++){
      const c = orangeCells[i];
      map[c.y][c.x] = (i < halfO) ? TILE.BREAK : TILE.WALL;
    }

    // Cyan: half BREAK, half EMPTY
    shuffle(cyanCells);
    const halfC = Math.floor(cyanCells.length/2);
    for (let i=0;i<cyanCells.length;i++){
      const c = cyanCells[i];
      map[c.y][c.x] = (i < halfC) ? TILE.BREAK : TILE.EMPTY;
    }
  }

  
  function shuffleLevelOrder() {
    levelOrder = [0,1,2];
    for (let i = levelOrder.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      const t = levelOrder[i]; levelOrder[i] = levelOrder[j]; levelOrder[j] = t;
    }
    currentLevelSetIndex = 0;
  }

function placeBreakableWalls() {
    // собираем кандидатов: стены внутри, не рамка, рядом есть пустота (чтобы было смысл ломать)
    const cand = [];
    for (let y=1;y<MAP_H-1;y++){
      for (let x=1;x<MAP_W-1;x++){
        if (map[y][x] !== TILE.WALL) continue;
        // хотя бы 2 соседних пустых — чтобы это был "перешейк"
        let empt=0;
        if (map[y][x+1]===TILE.EMPTY) empt++;
        if (map[y][x-1]===TILE.EMPTY) empt++;
        if (map[y+1][x]===TILE.EMPTY) empt++;
        if (map[y-1][x]===TILE.EMPTY) empt++;
        if (empt >= 1) cand.push({x,y});
      }
    }
    // перемешаем
    for (let i=cand.length-1;i>0;i--){
      const j=randi(0,i);
      [cand[i],cand[j]]=[cand[j],cand[i]];
    }
    const chosen = cand.slice(0, BREAKABLE_COUNT);
    for (const c of chosen) map[c.y][c.x] = TILE.BREAK;
  }

  /***********************
   *  Коллизии и проверка клетки
   ***********************/
  function inBounds(x,y){ return x>=0 && y>=0 && x<MAP_W && y<MAP_H; }
  function tileAt(x,y){
    const ix = Math.floor(x), iy = Math.floor(y);
    if (!inBounds(ix,iy)) return TILE.WALL;
    // если разрушаемая стена уничтожена — считаем EMPTY
    if (map[iy][ix] === TILE.BREAK && wallStates[iy][ix].destroyed) return TILE.EMPTY;
    return map[iy][ix];
  }
  function isSolidTile(t){ return t === TILE.WALL || t === TILE.BREAK; }

  function circleCollidesWall(cx,cy,r) {
    // проверяем 9 клеток вокруг
    const minX = Math.floor(cx - r), maxX = Math.floor(cx + r);
    const minY = Math.floor(cy - r), maxY = Math.floor(cy + r);
    for (let y=minY; y<=maxY; y++){
      for (let x=minX; x<=maxX; x++){
        if (!inBounds(x,y)) return true;
        const t = tileAt(x+0.0001,y+0.0001); // через tileAt с float
        if (!isSolidTile(t)) continue;
        // AABB vs circle
        const rx = clamp(cx, x, x+1);
        const ry = clamp(cy, y, y+1);
        const dx = cx - rx, dy = cy - ry;
        if (dx*dx + dy*dy < r*r) return true;
      }
    }
    return false;
  }

  function tryMove(obj, vx, vy, r) {
    // разделяем оси — классика, чтобы не "впрыгивать" в стену
    let nx = obj.x + vx, ny = obj.y;
    if (!circleCollidesWall(nx, ny, r)) obj.x = nx;
    else {
      // bump sound если игрок
      if (obj === player && Math.abs(vx) > 0.0001) SFX.wallBump();
    }
    nx = obj.x; ny = obj.y + vy;
    if (!circleCollidesWall(nx, ny, r)) obj.y = ny;
    else {
      if (obj === player && Math.abs(vy) > 0.0001) SFX.wallBump();
    }
  }

  /***********************
   *  LOS (линия видимости)
   ***********************/
  function hasLOS(ax,ay,bx,by, limitCells=LOS_LIMIT) {
    const d = dist(ax,ay,bx,by);
    if (d > limitCells) return false;
    // grid ray march
    const steps = Math.ceil(d * 12); // достаточно мелко
    const dx = (bx-ax)/steps, dy=(by-ay)/steps;
    let x=ax, y=ay;
    for (let i=0;i<steps;i++){
      x += dx; y += dy;
      const t = tileAt(x,y);
      if (isSolidTile(t)) return false;
    }
    return true;
  }

  // Для "не на глазах" — проверяем видимость клетки (центра клетки) от игрока
  function cellVisibleToPlayer(cx,cy) {
    const x = cx + 0.5, y = cy + 0.5;
    return hasLOS(player.x, player.y, x, y, LOS_LIMIT);
  }

  /***********************
   *  Спавн: поиск безопасной точки
   ***********************/
  function cellHasMovementSpace(cx,cy) {
    // запрет "зажатия": вокруг должен быть хотя бы один свободный вектор
    // и сам объект должен иметь зазор (радиус)
    const x = cx + 0.5, y = cy + 0.5;
    const r = 0.25;
    if (circleCollidesWall(x,y,r)) return false;

    // проверяем 4 направления: можно ли сдвинуться хотя бы куда-то
    const dirs = [[0.2,0],[ -0.2,0],[0,0.2],[0,-0.2]];
    let ok = false;
    for (const d of dirs){
      if (!circleCollidesWall(x+d[0], y+d[1], r)) { ok=true; break; }
    }
    return ok;
  }

  function findSpawnCell(options) {
    // options: { requireNotVisible:true, minDist:5, mustBeEmpty:true, tries:500, evenSpread:true }
    const tries = options?.tries ?? 600;
    const minDist = options?.minDist ?? SPAWN_MIN_DIST;
    const requireNotVisible = options?.requireNotVisible ?? true;

    // Сформируем список возможных пустых клеток
    const cells = [];
    for (let y=1;y<MAP_H-1;y++){
      for (let x=1;x<MAP_W-1;x++){
        if (tileAt(x+0.5,y+0.5) !== TILE.EMPTY) continue;
        if (!cellHasMovementSpace(x,y)) continue;
        // дистанция
        const d = dist(player.x, player.y, x+0.5, y+0.5);
        if (d < minDist) continue;
        // не на глазах
        if (requireNotVisible && cellVisibleToPlayer(x,y)) continue;
        cells.push({x,y});
      }
    }
    if (!cells.length) return null;

    // "равномерность": стараемся избегать кучкования — выбираем клетку, которая
    // максимизирует минимальную дистанцию до других сущностей того же "типа" (упрощённо).
    // ВАЖНО: чтобы спавн не повторялся из раза в раз, выбираем СЛУЧАЙНО из TOP-K лучших клеток.
    const scored = [];

    const probeCount = Math.min(tries, 220);
    for (let i=0;i<probeCount;i++){
      const c = cells[randi(0, cells.length-1)];
      let score = 0;

      // расстояние до врагов/предметов — чем больше, тем лучше (рассредоточение)
      for (const e of enemies){
        score += clamp(dist(c.x+0.5,c.y+0.5,e.x,e.y), 0, 12);
      }
      if (boss) score += clamp(dist(c.x+0.5,c.y+0.5,boss.x,boss.y), 0, 12);
      for (const it of items){
        score += clamp(dist(c.x+0.5,c.y+0.5,it.x,it.y), 0, 10) * 0.4;
      }
      // случайность, чтобы ломать "привычные" точки
      score += Math.random() * 6;

      scored.push({c, score});
    }

    scored.sort((a,b)=>b.score - a.score);
    const K = Math.min(12, scored.length);
    const pick = scored[randi(0, K-1)].c;
    return pick || cells[randi(0, cells.length-1)];
  }

  let nextEnemyId = 1;

  function makeEnemy(type, x, y, spawnCX=null, spawnCY=null) {
    const e = {

      knockVX: 0,
      knockVY: 0,
      meleeCd: 0
    };
    return e;
  }

  function makeBoss(x,y) {
    const b = {
      id: "boss",
      type:"boss",
      x,y,
      a:0,
      hp: 5 + (levelIndex - 1),
      hpMax: 5 + (levelIndex - 1),
      dead:false,
      shootCd: 0.2,
      charging: 0,
      gunSide: -1, // -1 left, +1 right (alternate)
      // скорость базовая (чуть медленнее melee)
      speed: 0.684 * Math.pow(1.05, levelIndex - 1), // базовая скорость босса: +5% за уровень
      
      speedBonus: 0,
      knockVX: 0,
      knockVY: 0,
      stunT: 0,
      meleeCd: 0
    };
    return b;
  }

  
  function farFromAll(x,y, arr, minD) {
    const minD2 = minD*minD;
    for (const o of arr) {
      if (!o || o.dead) continue;
      if (dist2(x,y,o.x,o.y) < minD2) return false;
    }
    return true;
  }

function spawnEnemy(type, opts=null) {
    // Spawn ONLY on predefined enemy spawners (red cells), but pick randomly and keep spacing.
    const o = opts || {};
    const candidates = (o.forceCell ? [o.forceCell] : enemySpawnerCells);
    if (!candidates || candidates.length===0) return false;

    const tries = o.forceCell ? 1 : 60;
    const minDist = (o.minDist != null) ? o.minDist : SPAWN_MIN_DIST;
    const allowNearPlayer = !!o.allowNearPlayer;
    const deferIfNearPlayer = !!o.deferIfNearPlayer;
    const requireNotVisible = (o.requireNotVisible != null) ? !!o.requireNotVisible : true;

    for (let attempt=0; attempt<tries; attempt++) {
      const c = candidates[(Math.random()*candidates.length)|0];
      const cell = {x:c.x, y:c.y};

      // замороженный спаунер временно не используется, пока игрок не убьёт врага с другого спаунера
      if (!o.forceCell && frozenEnemySpawnerKey && (`${cell.x},${cell.y}` === frozenEnemySpawnerKey)) continue;

      // cell must be empty and have space
      if (tileAt(cell.x+0.5, cell.y+0.5) !== TILE.EMPTY) continue;
      if (!cellHasMovementSpace(cell.x, cell.y)) continue;

      // distance from player
      const d = dist(player.x, player.y, cell.x+0.5, cell.y+0.5);
      if (!allowNearPlayer && d < minDist) {
        // При появлении игрока: враг НЕ спавнится ближе безопасного радиуса,
        // а "замораживается" на своём спаунере до тех пор, пока игрок не отойдёт.
        if (deferIfNearPlayer && minDist >= PLAYER_SAFE_SPAWN_RADIUS - 1e-6) {
          // не дублируем отложенный спавн в той же клетке
          const exists = deferredEnemySpawns.some(s=>s.cx===cell.x && s.cy===cell.y);
          if (!exists) deferredEnemySpawns.push({ type, cx:cell.x, cy:cell.y });
        }
        continue;
      }

      // not on eyes (optional)
      if (requireNotVisible && cellVisibleToPlayer(cell.x, cell.y)) continue;

      const px = cell.x + 0.5, py = cell.y + 0.5;

      // keep separation
      if (!farFromAll(px, py, enemies, 3.0)) continue;
      if (boss && !boss.dead && dist(px,py,boss.x,boss.y) < 4.0) continue;

      const e = makeEnemy(type, px, py, cell.x, cell.y);
      enemies.push(e);
      return true;
    }
    return false;
  }

  function spawnBossNow() {
    if (boss) return false;

    // Босс появляется на САМОМ дальнем спаунере от текущей клетки игрока.
    // Если спаунер уже занят врагом — враг исчезает, и босс появляется на его месте.
    let cell = null;

    if (enemySpawnerCells && enemySpawnerCells.length) {
      const px = player.x, py = player.y;

      // 1) Сначала попробуем выбрать дальний спаунер, который НЕ виден игроку (чтобы не «поп-ин» перед лицом).
      let bestD = -1;
      for (const c of enemySpawnerCells) {
        if (tileAt(c.x+0.5,c.y+0.5) !== TILE.EMPTY) continue;
        if (!cellHasMovementSpace(c.x,c.y)) continue;
        if (cellVisibleToPlayer(c.x,c.y)) continue;
        const d = dist(px,py,c.x+0.5,c.y+0.5);
        if (d > bestD) { bestD = d; cell = {x:c.x, y:c.y}; }
      }

      // 2) Если все дальние клетки видимы — всё равно берём самый дальний.
      if (!cell) {
        bestD = -1;
        for (const c of enemySpawnerCells) {
          if (tileAt(c.x+0.5,c.y+0.5) !== TILE.EMPTY) continue;
          if (!cellHasMovementSpace(c.x,c.y)) continue;
          const d = dist(px,py,c.x+0.5,c.y+0.5);
          if (d > bestD) { bestD = d; cell = {x:c.x, y:c.y}; }
        }
      }
    }

    if (!cell) cell = findSpawnCell({ requireNotVisible:true, minDist:SPAWN_MIN_DIST });
    if (!cell) return false;

    // Если в этой клетке стоит обычный враг — удалить его
    for (let i=enemies.length-1;i>=0;i--) {
      const e = enemies[i];
      if (e.dead) continue;
      if ((Math.floor(e.x)===cell.x) && (Math.floor(e.y)===cell.y)) {
        enemies.splice(i,1);
      }
    }
    // И если был отложенный спавн на этой клетке — тоже убираем (босс приоритетнее)
    for (let i=deferredEnemySpawns.length-1;i>=0;i--){
      const s = deferredEnemySpawns[i];
      if (s.cx===cell.x && s.cy===cell.y) deferredEnemySpawns.splice(i,1);
    }

    boss = makeBoss(cell.x+0.5, cell.y+0.5);
    // ВАЖНО: босс хранится отдельно (не в массиве enemies), иначе он обновляется и рисуется дважды.
    SFX.bossSpawnGlobal(); // 2 sec intro hum (global)
    return true;
  }

  function makeItem(kind,x,y) {
    return { kind, x, y, bob: rand(0,Math.PI*2), fadeNear:false };
  }

  function spawnItem(kind) {
    // Spawn ONLY on predefined item spawners (green cells), pick randomly and keep spacing.
    const candidates = itemSpawnerCells;
    if (!candidates || candidates.length===0) return false;

    for (let attempt=0; attempt<80; attempt++) {
      const c = candidates[(Math.random()*candidates.length)|0];
      const x = c.x + 0.5, y = c.y + 0.5;

      if (tileAt(x,y) !== TILE.EMPTY) continue;
      if (!cellHasMovementSpace(c.x,c.y)) continue;

      // don't spawn too close to player
      if (dist(player.x,player.y,x,y) < 3.0) continue;

      // avoid overlapping items/enemies/boss
      if (!farFromAll(x,y, items, 1.4)) continue;
      if (!farFromAll(x,y, enemies, 2.0)) continue;
      if (boss && !boss.dead && dist(x,y,boss.x,boss.y) < 3.0) continue;

      const it = makeItem(kind, x, y);
      items.push(it);
      return true;
    }
    return false;
  }

  function getEnemyTargetsForLevel() {
    const sp = (enemySpawnerCells && enemySpawnerCells.length) ? enemySpawnerCells.length : 0;

    // База для 1-го уровня (как было раньше)
    let baseM = TARGET_MELEE;
    let baseS = TARGET_SHOOT;

    // Если спаунеров меньше базы — ужимаем базу под доступные точки
    while (baseM + baseS > sp && (baseM>0 || baseS>0)) {
      if (baseM >= baseS && baseM>0) baseM--;
      else if (baseS>0) baseS--;
      else baseM--;
    }

    // Рост по уровням: +2 врага на каждый новый уровень (+1 melee и +1 shoot)
    const extra = Math.max(0, levelIndex - 1);
    let wantM = baseM;
    let wantS = baseS;
    for (let k=1; k<=extra; k++) {
      wantM++;
      wantS++;
    }

    // Кэп по количеству спаунеров
    let over = (wantM + wantS) - sp;
    // Сначала снимаем «лишнее» с добавок (в обратном порядке)
    for (let k=extra; k>=1 && over>0; k--) {
      if ((k % 2) === 1) { if (wantM > baseM) { wantM--; over--; } }
      else { if (wantS > baseS) { wantS--; over--; } }
    }
    // Если остался один лишний слот (нечётность) — случайно убираем тип
    if (over===1){
      if (Math.random()<0.5 && wantM>0){ wantM--; over--; }
      else if (wantS>0){ wantS--; over--; }
    }

    // Если всё ещё больше — подрезаем базу
    while (over>0 && (wantM>0 || wantS>0)) {
      if (wantM >= wantS && wantM>0) { wantM--; over--; }
      else if (wantS>0) { wantS--; over--; }
      else break;
    }

    return { melee: wantM, shoot: wantS, max: sp };
  }

  function enforceCounts() {
    // враги (учитываем и живых, и «замороженных» у спаунеров)
    const aliveM = enemies.filter(e=>!e.dead && e.type==="melee").length;
    const aliveS = enemies.filter(e=>!e.dead && e.type==="shoot").length;
    const defM = deferredEnemySpawns.filter(s=>s.type==="melee").length;
    const defS = deferredEnemySpawns.filter(s=>s.type==="shoot").length;

    const haveM = aliveM + defM;
    const haveS = aliveS + defS;

    const tgt = getEnemyTargetsForLevel();

    const spawnOpts = spawnProtectionMode
      ? { minDist: PLAYER_SAFE_SPAWN_RADIUS, deferIfNearPlayer:true, requireNotVisible:true }
      : null;

    for (let i=haveM; i<tgt.melee; i++) {
      // если не удалось — попробуем позже
      if (!spawnEnemy("melee", spawnOpts)) break;
    }
    for (let i=haveS; i<tgt.shoot; i++) {
      if (!spawnEnemy("shoot", spawnOpts)) break;
    }

    // предметы: строгое количество
    // ВАЖНО: для бонусов учитываем и уже лежащие предметы, и ожидающие респавна в очереди,
    // чтобы на уровне одновременно не появлялось больше 1 экземпляра каждого бонуса.
    const countKindLive = (k)=>items.filter(it=>it.kind===k).length;
    const countKindQueued = (k)=>itemRespawnQueue.filter(q=>q.kind===k).length;
    const countKindTotal = (k)=>countKindLive(k) + countKindQueued(k);

    const want = [
      ["med", FIX_MEDKIT],
      ["super", FIX_SUPER],
      ["boots", FIX_BOOTS],
      ["dmg", FIX_DAMAGE],
      ["wings", FIX_WINGS],
    ];
    for (const [k,n] of want) {
      for (let i=countKindTotal(k); i<n; i++) {
        if (!spawnItem(k)) break;
      }
    }
  }
  /***********************
   *  Отложенные спавны врагов (safe spawn)
   ***********************/
  function updateDeferredEnemySpawns() {
    if (!deferredEnemySpawns.length) return;

    for (let i=deferredEnemySpawns.length-1; i>=0; i--) {
      const s = deferredEnemySpawns[i];
      const cx = s.cx, cy = s.cy;
      const px = cx + 0.5, py = cy + 0.5;

      // Ждём, пока игрок отойдёт от "замороженного" спаунера минимум на PLAYER_SAFE_SPAWN_RADIUS клеток
      if (dist(player.x, player.y, px, py) < PLAYER_SAFE_SPAWN_RADIUS) continue;

      // Не спавним на глазах, чтобы не было магического появления
      if (cellVisibleToPlayer(cx, cy)) continue;

      // Клетка должна быть свободной
      if (tileAt(px, py) !== TILE.EMPTY) continue;
      if (!cellHasMovementSpace(cx, cy)) continue;

      // Если в клетке кто-то стоит — ждём
      let occupied = false;
      for (const e of enemies) {
        if (e.dead) continue;
        if (Math.floor(e.x)===cx && Math.floor(e.y)===cy) { occupied = true; break; }
      }
      if (boss && !boss.dead && Math.floor(boss.x)===cx && Math.floor(boss.y)===cy) occupied = true;
      if (occupied) continue;

      // Спавним строго в этой клетке
      const ok = spawnEnemy(s.type, { forceCell:{x:cx,y:cy}, allowNearPlayer:true, requireNotVisible:true });
      if (ok) deferredEnemySpawns.splice(i,1);
    }
  }

  /***********************
   *  Разрушение/восстановление стен
   ***********************/
  function destroyWallCell(cx,cy) {
    if (!inBounds(cx,cy)) return false;
    if (map[cy][cx] !== TILE.BREAK) return false;
    const st = wallStates[cy][cx];
    if (st.destroyed) return false;
    st.destroyed = true;
    st.destroyAnim = 0;
    st.restoreAt = timeNow + WALL_RESTORE_DELAY;
    st.pendingRestore = true;
    SFX.wallBreak();
    return true;
  }

  function canRestoreWall(cx,cy) {
    // условия: >=5 клеток от игрока, клетка не в LOS, и рядом никого нет
    const centerX = cx+0.5, centerY = cy+0.5;
    if (dist(player.x, player.y, centerX, centerY) < SPAWN_MIN_DIST) return false;
    if (cellVisibleToPlayer(cx,cy)) return false;

    // никого в клетке/рядом (чтобы не замуровать)
    const rad = 0.45;
    // игрок
    if (dist(player.x, player.y, centerX, centerY) < rad) return false;
    // враги
    for (const e of enemies){
      if (e.dead) continue;
      if (dist(e.x, e.y, centerX, centerY) < rad) return false;
    }
    if (boss && !boss.dead) {
      if (dist(boss.x, boss.y, centerX, centerY) < rad) return false;
    }
    // если всё ок — можно
    return true;
  }

  function updateWalls(dt) {
    for (let y=0;y<MAP_H;y++){
      for (let x=0;x<MAP_W;x++){
        const st = wallStates[y][x];
        if (st.destroyed) {
          st.destroyAnim = clamp(st.destroyAnim + dt*5, 0, 1);
          if (st.pendingRestore && timeNow >= st.restoreAt) {
            if (canRestoreWall(x,y)) {
              // восстанавливаем
              st.destroyed = false;
              st.pendingRestore = false;
              st.destroyAnim = 0;
            } else {
              // ждём дальше
              st.restoreAt = timeNow + 0.25;
            }
          }
        }
      }
    }
  }

  /***********************
   *  Логика стрельбы
   ***********************/
  function playerShoot() {
    if (player.fireCd > 0) return;
    player.fireCd = PLAYER_FIRE_COOLDOWN;
    player.weaponKick = 0.15;
    SFX.shootPlayer();

    // луч: проверяем попадание по врагам/стенам.
    const maxD = PLAYER_SHOT_RANGE;
    const rayDx = Math.cos(player.a);
    const rayDy = Math.sin(player.a);

    // пройдём по лучу шагами
    const steps = 400;
    let hitWallCell = null;

    for (let i=0;i<steps;i++){
      const t = (i/steps) * maxD;
      const x = player.x + rayDx*t;
      const y = player.y + rayDy*t;

      const cx = Math.floor(x), cy = Math.floor(y);
      const tile = tileAt(x,y);

      // враги: проверим круговые хитбоксы
      // (проверяем ближе к игроку, поэтому сначала враги)
      for (const e of enemies) {
      if (e.type === "boss") continue; // safety: boss updates отдельно

        if (e.dead) continue;
        const r = 0.28;
        if (dist2(x,y,e.x,e.y) < r*r) {
          applyDamageToEnemy(e, 1);
          return;
        }
      }
      if (boss && !boss.dead) {
        const r = 0.40;
        if (dist2(x,y,boss.x,boss.y) < r*r) {
          applyDamageToBoss(1);
          return;
        }
      }

      // стена
      if (isSolidTile(tile)) {
        hitWallCell = {cx,cy};
        break;
      }
    }

    if (hitWallCell) {
      const {cx,cy} = hitWallCell;
      // если разрушаемая — ломаем
      if (map[cy][cx] === TILE.BREAK && !wallStates[cy][cx].destroyed) {
        destroyWallCell(cx,cy);
      }
    }
  }


  function registerKilledEnemySpawner(e) {
    const key = (e && e.spawnCX != null && e.spawnCY != null) ? `${e.spawnCX},${e.spawnCY}` : null;
    if (!key) return;

    // Если был замороженный спаунер, он размораживается только после убийства врага с другого спаунера
    if (frozenEnemySpawnerKey && key !== frozenEnemySpawnerKey) {
      frozenEnemySpawnerKey = null;
    }

    // Если два убийства подряд с одного и того же спаунера — замораживаем его
    if (lastKilledEnemySpawner && key === lastKilledEnemySpawner) {
      frozenEnemySpawnerKey = key;
    }

    lastKilledEnemySpawner = key;
  }

  function applyDamageToEnemy(e, dmg) {
    // учитываем двойной урон
    const mul = (player.dmgBoostT > 0) ? 2 : 1;
    e.hp -= dmg * mul;
    SFX.hitEnemy();
    // knockback + stun (quarter-cell feel like player)
    const k = 3.0; // impulse
    e.knockVX += Math.cos(player.a) * k;
    e.knockVY += Math.sin(player.a) * k;
    e.stunT = Math.max(e.stunT||0, HIT_STUN_TIME);
    if (e.hp <= 0) {
      e.dead = true;
      registerKilledEnemySpawner(e);
      explosions.push({x:e.x,y:e.y,t:0});
      SFX.explode();
      killsTotal += 1;
      killsInLevel += 1;
      // очередь респавна
      respawnQueue.push({type:e.type, at: timeNow + ENEMY_RESPAWN_DELAY});
      // проверка босса
      handleBossSpawnAndSpeedup();
    }
  }

  function applyDamageToBoss(dmg) {
    const mul = (player.dmgBoostT > 0) ? 2 : 1;
    boss.hp -= dmg * mul;
    SFX.hitEnemy();
    // knockback + stun (quarter-cell feel like player)
    const k = 3.0;
    boss.knockVX += Math.cos(player.a) * k;
    boss.knockVY += Math.sin(player.a) * k;
    boss.stunT = Math.max(boss.stunT||0, HIT_STUN_TIME);
    if (boss.hp <= 0) {
      boss.dead = true;
      explosions.push({x:boss.x,y:boss.y,t:0});
      SFX.explode();
      // переход уровня
      onBossKilled();
    }
  }

  function handleBossSpawnAndSpeedup() {
    // Спавн босса на каждом 10-м убийстве НА УРОВНЕ (простых врагов), если босса ещё нет
    if (!boss && killsInLevel > 0 && (killsInLevel % 10 === 0)) {
      spawnBossNow();
      return;
    }

    // Бонус скорости босса «за десятки» — действует только в рамках текущего уровня
    // (на следующем уровне killsInLevel сбрасывается, но базовая скорость босса растёт с levelIndex)
    if (boss && !boss.dead) {
      const overKills = Math.max(0, killsInLevel - 10);
      boss.speedBonus = ((overKills * (overKills + 3)) / 2) * 0.01;   // накопительно: 11-е=+2%, 12-е=+5%, 13-е=+9%, 14-е=+14% и т.д.
    }
  }

  
  function spawnBossKillSmoke() {
    for (let i=0;i<28;i++){
      smokePuffs.push({
        x: boss ? boss.x : player.x,
        y: boss ? boss.y : player.y,
        vx: rand(-0.6,0.6),
        vy: rand(-0.6,0.6),
        life: rand(0.6,1.2),
        r: rand(0.15,0.35)
      });
    }
  }

  function onBossKilled() {

  /***********************
   *  Путь босса: кратчайший путь с приоритетом пролома разрушаемых стен
   ***********************/
  function bossNextStepTowardPlayer() {
    if (!boss || boss.dead) return null;
    const sx = Math.floor(boss.x), sy = Math.floor(boss.y);
    const tx = Math.floor(player.x), ty = Math.floor(player.y);
    if (!inBounds(sx,sy) || !inBounds(tx,ty)) return null;
    if (sx===tx && sy===ty) return null;

    // Dijkstra на маленькой карте: cost EMPTY=1, BREAK=0.85 (предпочитаем ломать), WALL=∞
    const W = MAP_W, H = MAP_H;
    const INF = 1e9;
    const distArr = new Float32Array(W*H);
    const prev = new Int32Array(W*H);
    const used = new Uint8Array(W*H);
    distArr.fill(INF);
    prev.fill(-1);

    const sIdx = sy*W + sx;
    const tIdx = ty*W + tx;
    distArr[sIdx] = 0;

    // простая «очередь» O(n²) — карта маленькая, нам ок
    for (;;) {
      let v = -1;
      let best = INF;
      for (let i=0;i<W*H;i++){
        if (used[i]) continue;
        const d = distArr[i];
        if (d < best) { best=d; v=i; }
      }
      if (v === -1 || best === INF) break;
      if (v === tIdx) break;
      used[v] = 1;

      const vx = v % W, vy = (v / W) | 0;
      const nbrs = [[vx+1,vy],[vx-1,vy],[vx,vy+1],[vx,vy-1]];
      for (const [nx,ny] of nbrs) {
        if (!inBounds(nx,ny)) continue;
        const tile = map[ny][nx];
        if (tile === TILE.WALL) continue; // обычные стены непроходимы
        // разрушаемые — можно (босс проломит), пустые — можно
        const w = (tile === TILE.BREAK) ? 0.85 : 1.0;
        const ni = ny*W + nx;
        const nd = distArr[v] + w;
        if (nd < distArr[ni]) {
          distArr[ni] = nd;
          prev[ni] = v;
        }
      }
    }

    if (prev[tIdx] === -1) return null;

    // восстановим путь от цели к старту, найдём первый шаг
    let cur = tIdx;
    let p = prev[cur];
    while (p !== -1 && p !== sIdx) {
      cur = p;
      p = prev[cur];
    }
    const nx = cur % W, ny = (cur / W) | 0;
    return { x:nx, y:ny };
  }

/***********************
   *  Вражеские выстрелы
   ***********************/
  function fireBullet(fromX, fromY, dirX, dirY, owner) {
    // Ракета: быстрее (x1.5) и с небольшим "реактивным" поведением (легкая акселерация + дрожание траектории)
    const baseSpeed = (owner==="boss" ? 5.0 : 4.0) * 1.5;
    const r = (owner==="boss" ? 0.11 : 0.08) * 0.5; // хитбокс снаряда в 2 раза меньше
    const len = Math.hypot(dirX, dirY) || 1;
    const dx = dirX/len, dy = dirY/len;

    bullets.push({
      x:fromX, y:fromY,
      dx, dy,
      speed: baseSpeed,
      r,
      owner,
      travel: 0,
      phase: Math.random()*Math.PI*2
    });

    SFX.shooterShot();
  }

  /***********************
   *  Предметы: эффекты
   ***********************/
  function flashPickup(r,g,b, t=1.0) {
    player.pickupFlash.t = Math.max(player.pickupFlash.t, t);
    player.pickupFlash.r = r;
    player.pickupFlash.g = g;
    player.pickupFlash.b = b;
  }

  function applyItem(kind) {
    if (kind === "med") {
      if (player.hp >= PLAYER_MAX_HP) return false;
      SFX.pickupMed();
      player.hp = Math.min(PLAYER_MAX_HP, player.hp + 1);
      flashPickup(0,255,120, 0.9);
      return true;
    }
    if (kind === "super") {
      SFX.pickupSuper();
      if (player.hp >= PLAYER_MAX_HP) return false;
      player.hp = PLAYER_MAX_HP;
      flashPickup(255,70,70, 0.9);
      return true;
    }
    if (kind === "boots") {
      SFX.pickupBoots();
      player.speedBoostT = POWERUP_DURATION;
      flashPickup(60,255,120, 0.9);
      return true;
    }
    if (kind === "dmg") {
      SFX.pickupDmg();
      player.dmgBoostT = POWERUP_DURATION;
      flashPickup(255,80,80, 0.9);
      return true;
    }
    if (kind === "wings") {
      SFX.pickupWings();
      player.invulnT = POWERUP_DURATION;
      flashPickup(220,240,255, 0.9);
      return true;
    }
    return false;
  }

  /***********************
   *  Урон игроку
   ***********************/
  function damagePlayer(amount, fromVX, fromVY) {
    // Во время неуязвимости игрок всё равно получает эффекты удара (отталкивание, стан, вспышка),
    // но НЕ теряет HP.
    const canLoseHP = !(player.invulnT > 0 || player.hurtInvul > 0);

    if (canLoseHP) player.hp -= amount;

    player.hurtFlash = Math.max(player.hurtFlash, 0.35);
    // даём i-frames как и раньше (и обновляем их при повторном попадании)
    player.hurtInvul = 0.50;

    // stun during knockback
    player.stunT = HIT_STUN_TIME;

    // knockback по направлению удара
    const k = 3.0; // strong knockback (~1/4 cell feel)
    player.knockVX += fromVX * k;
    player.knockVY += fromVY * k;

    if (canLoseHP && player.hp <= 0) {
      player.hp = 0;
      onPlayerDeath();
    }
  }

  let textures = null;

  function newLevel() {
    pal = colorSetForLevel();
    textures = buildTextures(pal);
    currentLevelSetIndex = (levelIndex - 1) % ALL_LEVEL_LAYOUTS.length;
    initMap();

    // Спавн игрока только на синих клетках (S)
    if (playerSpawnCells && playerSpawnCells.length) {
      const s = playerSpawnCells[(Math.random()*playerSpawnCells.length)|0];
      player.x = s.x + 0.5;
      player.y = s.y + 0.5;
    } else {
      // fallback
      const cell = findSpawnCell({ requireNotVisible:false, minDist:2, tries:800 });
      if (cell) { player.x = cell.x + 0.5; player.y = cell.y + 0.5; }
      else { player.x = 1.5; player.y = 1.5; }
    }

    // Поворачиваем игрока так, чтобы он СТАРТОВАЛ лицом к открытой клетке (не к стене)
    {
      const cx = Math.floor(player.x), cy = Math.floor(player.y);
      const dirs = [
        {dx:1,dy:0}, {dx:-1,dy:0}, {dx:0,dy:1}, {dx:0,dy:-1}
      ];
      const open = [];
      for (const d of dirs) {
        const nx = cx + d.dx, ny = cy + d.dy;
        if (!inBounds(nx,ny)) continue;
        if (tileAt(nx+0.5, ny+0.5) === TILE.EMPTY) open.push({x:nx+0.5, y:ny+0.5});
      }
      if (open.length) {
        const t = open[randi(0, open.length-1)];
        player.a = Math.atan2(t.y - player.y, t.x - player.x);
      } else {
        player.a = rand(-Math.PI, Math.PI);
      }
    }

    player.fireCd = 0;
    player.weaponKick = 0;
    player.knockVX = player.knockVY = 0;

    // наполняем врагами и предметами
    enemies.length = 0;
    items.length = 0;
    bullets.length = 0;
    explosions.length = 0;
    muzzleFlashes.length = 0;
    smokePuffs.length = 0;

    // правило: при появлении игрока враги не должны появляться ближе 6 клеток
    deferredEnemySpawns.length = 0;
    spawnProtectionMode = true;
    enforceCounts();
    spawnProtectionMode = false;
  }

  const keys = new Set();
  // оверлей рекордов (переключается в меню по C/С)
  let showScoresOverlay = false;
  let mouseDown = false;
  let pointerLocked = false;
  const MOUSE_SENS = 0.0026; // чувствительность mouselook

  let rawMouseDX = 0;

  // clean mobile stick state
  const mobileAxes = {
    moveX: 0,
    moveY: 0,
    lookX: 0,
    lookY: 0
  };

  function setMenuPressedVisual(on) {
    const btn = document.querySelector('.ctrl-btn-menu');
    if (btn) btn.classList.toggle('is-active', !!on);
  }

  const virtualKeyMap = {
    forward: ["w"],
    back: ["s"],
    strafeLeft: ["a"],
    strafeRight: ["d"],
    turnLeft: ["arrowleft"],
    turnRight: ["arrowright"],
    fire: [" "],
    run: ["shift"]
  };
  const activeVirtualPointers = new Map();
  const moveStick = document.getElementById("moveStick");
  const lookStick = document.getElementById("lookStick");
  const moveStickKnob = moveStick?.querySelector(".joystick-knob");
  const lookStickKnob = lookStick?.querySelector(".joystick-knob");
  const virtualAxes = {
    moveX: 0,
    moveY: 0,
    lookX: 0
  };

  function setVirtualAction(action, pressed) {
    if (pressed && gameState === STATE.MENU && action !== "pause") startFromMenu();
    if (action === "pause") {
      if (pressed) {
        if (gameState === STATE.PLAYING) { gameState = STATE.PAUSED; setAudioPaused(true); }
        else if (gameState === STATE.PAUSED) { gameState = STATE.PLAYING; setAudioPaused(false); }
        else if (gameState === STATE.MENU) { startFromMenu(); }
      }
      return;
    }
    const mapped = virtualKeyMap[action];
    if (!mapped) return;
    for (const k of mapped) {
      if (pressed) keys.add(k);
      else keys.delete(k);
    }
    if (action === "fire") mouseDown = !!pressed;
  }

  function resetJoystickElement(el, knob) {
    if (!el || !knob) return;
    el.classList.remove("is-active");
    knob.style.transform = "translate(0px, 0px)";
  }

  function releaseAllVirtualActions() {
    for (const action of activeVirtualPointers.values()) setVirtualAction(action, false);
    activeVirtualPointers.clear();
    mouseDown = false;
    virtualAxes.moveX = 0;
    virtualAxes.moveY = 0;
    virtualAxes.lookX = 0;
    resetJoystickElement(moveStick, moveStickKnob);
    resetJoystickElement(lookStick, lookStickKnob);
  }

  function bindJoystick(el, knob, kind) {
    if (!el || !knob) return;
    let pointerId = null;

    const updateFromEvent = (e) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width * 0.5;
      const cy = rect.top + rect.height * 0.5;
      let dx = e.clientX - cx;
      let dy = e.clientY - cy;
      const maxR = rect.width * 0.5 - knob.getBoundingClientRect().width * 0.5 - 6;
      const len = Math.hypot(dx, dy) || 1;
      if (len > maxR) {
        const s = maxR / len;
        dx *= s;
        dy *= s;
      }
      knob.style.transform = `translate(${dx}px, ${dy}px)`;
      el.classList.add("is-active");
      const nx = maxR > 0 ? clamp(dx / maxR, -1, 1) : 0;
      const ny = maxR > 0 ? clamp(dy / maxR, -1, 1) : 0;
      if (kind === "move") {
        virtualAxes.moveX = nx;
        virtualAxes.moveY = ny;
      } else {
        virtualAxes.lookX = nx;
      }
    };

    const finish = () => {
      pointerId = null;
      if (kind === "move") {
        virtualAxes.moveX = 0;
        virtualAxes.moveY = 0;
      } else {
        virtualAxes.lookX = 0;
      }
      resetJoystickElement(el, knob);
    };

    el.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      ensureAudio();
      audioCtx?.resume?.();
      if (gameState === STATE.MENU) startFromMenu();
      pointerId = e.pointerId;
      el.setPointerCapture?.(e.pointerId);
      updateFromEvent(e);
    }, { passive:false });

    el.addEventListener("pointermove", (e) => {
      if (e.pointerId !== pointerId) return;
      e.preventDefault();
      updateFromEvent(e);
    }, { passive:false });

    const end = (e) => {
      if (e.pointerId !== pointerId) return;
      e.preventDefault();
      finish();
    };
    el.addEventListener("pointerup", end, { passive:false });
    el.addEventListener("pointercancel", end, { passive:false });
    el.addEventListener("lostpointercapture", () => finish());
  }

  function bindControlButtons() {
    bindJoystick(moveStick, moveStickKnob, "move");
    bindJoystick(lookStick, lookStickKnob, "look");
    const buttons = Array.from(document.querySelectorAll('.ctrl-btn[data-key]'));
    for (const btn of buttons) {
      const action = btn.dataset.key;
      const press = (pointerId) => {
        ensureAudio();
        audioCtx?.resume?.();
        activeVirtualPointers.set(pointerId, action);
        btn.classList.add('is-active');
        setVirtualAction(action, true);
      };
      const release = (pointerId) => {
        const current = activeVirtualPointers.get(pointerId);
        if (current !== action) return;
        activeVirtualPointers.delete(pointerId);
        btn.classList.remove('is-active');
        setVirtualAction(action, false);
      };
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        btn.setPointerCapture?.(e.pointerId);
        press(e.pointerId);
      }, { passive:false });
      btn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        release(e.pointerId);
      }, { passive:false });
      btn.addEventListener('pointercancel', (e) => {
        e.preventDefault();
        release(e.pointerId);
      }, { passive:false });
      btn.addEventListener('lostpointercapture', (e) => {
        release(e.pointerId);
      });
    }
    window.addEventListener('blur', releaseAllVirtualActions);
  }


  function requestPL() {
    if (canvas.requestPointerLock) canvas.requestPointerLock();
  }
  function exitPL() {
    if (document.exitPointerLock) document.exitPointerLock();
  }
  document.addEventListener("pointerlockchange", () => {
    pointerLocked = (document.pointerLockElement === canvas);
  });

  window.addEventListener("mousemove", (e) => {
    if (gameState !== STATE.PLAYING) return;
    if (!pointerLocked) return;
    // копим движение мыши, а плавность применяем в игровом цикле
    rawMouseDX += (e.movementX || 0);
  });

  window.addEventListener("keydown", (e) => {
    const k = keyToLower(e.key);

    // запуск аудио на первое действие
    ensureAudio();
    audioCtx?.resume?.();

    if (k === "enter") {
      if (gameState === STATE.MENU && !showScoresOverlay) {
        startFromMenu();
        e.preventDefault();
        return;
      }
      if (gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED;
        setAudioPaused(true);
        e.preventDefault();
        return;
      } else if (gameState === STATE.PAUSED) {
        gameState = STATE.PLAYING;
        setAudioPaused(false);
        e.preventDefault();
        return;
      } else if (gameState === STATE.GAMEOVER_ENTRY) {
        // Enter — сохранить имя и вернуться в меню
        const nm = (nameInput.value || "").slice(0,5);
        insertScore(nm, lastScore);
        gameState = STATE.MENU;
        setAudioPaused(false);
        stopBossDrone();
        e.preventDefault();
        return;
      }
    }

    // Esc — поставить паузу во время игры, а на экране ввода имени сделать то же, что Enter
    if (k === "escape" || k === "esc") {
      if (gameState === STATE.PLAYING) {
        gameState = STATE.PAUSED;
        setAudioPaused(true);
        e.preventDefault();
        return;
      } else if (gameState === STATE.GAMEOVER_ENTRY) {
        const nm = (nameInput.value || "").slice(0,5);
        insertScore(nm, lastScore);
        gameState = STATE.MENU;
        setAudioPaused(false);
        stopBossDrone();
        e.preventDefault();
        return;
      }
    }

    // R/К — выйти в меню только во время паузы
    if ((k === "r" || k === "к") && gameState === STATE.PAUSED) {
      gameState = STATE.MENU;
      setAudioPaused(false);
      stopBossDrone();
      exitPL();
      e.preventDefault();
      return;
    }

    // C/С — открыть / закрыть рекорды
    if (k === "c" || k === "с") {
      if (gameState === STATE.MENU && !showScoresOverlay) {
        showScoresOverlay = true;
        gameState = STATE.SCOREBOARD;
        e.preventDefault();
        return;
      } else if (gameState === STATE.SCOREBOARD || showScoresOverlay) {
        showScoresOverlay = false;
        gameState = STATE.MENU;
        e.preventDefault();
        return;
      }
    }

keys.add(k);

    // старт из меню
    if (gameState === STATE.MENU) {
      if (k === " " || k === "space" || k === "spacebar") {
        startFromMenu();
        requestPL();
      }
    }

    // блокируем скролл стрелками/пробелом
    if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(k)) e.preventDefault();
  }, { passive:false });

  window.addEventListener("keyup", (e) => {
    keys.delete(keyToLower(e.key));
  });

  canvas.addEventListener("mousedown", (e) => {
    ensureAudio(); audioCtx?.resume?.();
    mouseDown = true;
    if (gameState === STATE.MENU) { startFromMenu(); requestPL(); }
    else if (gameState === STATE.PLAYING) { requestPL(); }
  });
  window.addEventListener("mouseup", () => mouseDown = false);


  function bindMenuButton() {

    const togglePause = () => {
      ensureAudio();
      audioCtx?.resume?.();
