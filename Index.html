  function bindStick(stickId, kind) {
    const el = document.getElementById(stickId);
    if (!el) return;
    const knob = el.querySelector('.joystick-knob');
    if (!knob) return;

    let activeTouchId = null;
    let activePointerId = null;

    const apply = (clientX, clientY) => {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width * 0.5;
      const cy = rect.top + rect.height * 0.5;
      let dx = clientX - cx;
      let dy = clientY - cy;

      const maxR = rect.width * 0.5 - knob.getBoundingClientRect().width * 0.5 - 6;
      const len = Math.hypot(dx, dy) || 1;
      if (len > maxR) {
        const s = maxR / len;
        dx *= s;
        dy *= s;
      }

      knob.style.transform = `translate(${dx}px, ${dy}px)`;
      el.classList.add('is-active');

      const nx = maxR > 0 ? Math.max(-1, Math.min(1, dx / maxR)) : 0;
      const ny = maxR > 0 ? Math.max(-1, Math.min(1, dy / maxR)) : 0;

      if (kind === 'move') {
        mobileAxes.moveX = nx;
        mobileAxes.moveY = ny;
      } else {
        mobileAxes.lookX = nx;
        mobileAxes.lookY = ny;
      }
    };

    const release = () => {
      activeTouchId = null;
      activePointerId = null;
      knob.style.transform = 'translate(0px, 0px)';
      el.classList.remove('is-active');
      el.classList.remove('is-shooting');
      el.classList.remove('is-running');

      if (kind === 'move') {
        mobileAxes.moveX = 0;
        mobileAxes.moveY = 0;
      } else {
        mobileAxes.lookX = 0;
        mobileAxes.lookY = 0;
      }
    };

    el.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      if (!t) return;
      ensureAudio();
      audioCtx?.resume?.();
      if (gameState === STATE.MENU) startFromMenu();
      activeTouchId = t.identifier;
      apply(t.clientX, t.clientY);
      e.preventDefault();
    }, { passive:false });

    el.addEventListener('touchmove', (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier !== activeTouchId) continue;
        apply(t.clientX, t.clientY);
        e.preventDefault();
        break;
      }
    }, { passive:false });

    const tend = (e) => {
      for (const t of e.changedTouches) {
        if (t.identifier !== activeTouchId) continue;
        release();
        e.preventDefault();
        break;
      }
    };
    el.addEventListener('touchend', tend, { passive:false });
    el.addEventListener('touchcancel', tend, { passive:false });

    el.addEventListener('pointerdown', (e) => {
      ensureAudio();
      audioCtx?.resume?.();
      if (gameState === STATE.MENU) startFromMenu();
      activePointerId = e.pointerId;
      el.setPointerCapture?.(e.pointerId);
      apply(e.clientX, e.clientY);
      e.preventDefault();
    }, { passive:false });

    el.addEventListener('pointermove', (e) => {
      if (e.pointerId !== activePointerId) return;
      apply(e.clientX, e.clientY);
      e.preventDefault();
    }, { passive:false });

    const pend = (e) => {
      if (e.pointerId !== activePointerId) return;
      release();
      e.preventDefault();
    };
    el.addEventListener('pointerup', pend, { passive:false });
    el.addEventListener('pointercancel', pend, { passive:false });
  }

  window.addEventListener('load', () => {
    bindStick('moveStick', 'move');
    bindStick('lookStick', 'look');
    bindMenuButton();
  });

  function startFromMenu() {
    showScoresOverlay = false;
    stopBossDrone();
    gameState = STATE.PLAYING;
    setAudioPaused(false);
    newGame();
    scheduleAmbient(nowA());
  }

  /***********************
   *  Игровой цикл
   ***********************/
  let lastT = performance.now();
  let timeNow = 0; // игровое время в секундах

  function easeParabolaFastStart(t) {
    t = clamp(t, 0, 1);
    return 1 - (1 - t) * (1 - t); // fast start, slow finish
  }

  function approachParabolic(current, target, dt, riseTime, fallTime) {
    const curAbs = Math.abs(current);
    const tgtAbs = Math.abs(target);
    const time = (tgtAbs > curAbs) ? riseTime : fallTime;
    if (time <= 0) return target;

    const sameDir = (current === 0 || target === 0 || Math.sign(current) === Math.sign(target));
    if (!sameDir) {
      const toZeroStep = dt / time;
      if (curAbs <= toZeroStep) return 0;
      return current - Math.sign(current) * toZeroStep;
    }

    const sign = (target !== 0) ? Math.sign(target) : Math.sign(current);
    const curNorm = clamp(curAbs, 0, 1);
    const curProgress = 1 - Math.sqrt(Math.max(0, 1 - curNorm));
    const nextProgress = clamp(curProgress + dt / time, 0, 1);
    const nextAbs = tgtAbs * easeParabolaFastStart(nextProgress);

    if (tgtAbs <= 0.00001) return sign * nextAbs;
    return sign * Math.min(tgtAbs, nextAbs);
  }

  function tick(ts) {
    const dt = clamp((ts - lastT) / 1000, 0, 0.05);
    lastT = ts;

    // обновляем таймеры только в PLAYING
    if (gameState === STATE.PLAYING) {
      timeNow += dt;
      update(dt);
    }

    render();
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  function update(dt) {
    // аудио-эмбиент
    if (audioCtx) tickAmbient(nowA(), true);

    // таймеры игрока
    player.fireCd = Math.max(0, player.fireCd - dt);
    player.weaponKick = Math.max(0, player.weaponKick - dt);
    player.hurtFlash = Math.max(0, player.hurtFlash - dt);
    if (player.pickupFlash.t > 0) player.pickupFlash.t = Math.max(0, player.pickupFlash.t - dt*1.2);

    player.speedBoostT = Math.max(0, player.speedBoostT - dt);
    player.dmgBoostT = Math.max(0, player.dmgBoostT - dt);
    player.invulnT = Math.max(0, player.invulnT - dt);
    player.hurtInvul = Math.max(0, player.hurtInvul - dt);

        player.stunT = Math.max(0, player.stunT - dt);
// движение игрока
    const moveR = 0.25;
    let forward = 0, strafe = 0, turn = 0;

    
    // stun: movement locked, but looking + shooting allowed
    if (player.stunT > 0) { forward = 0; strafe = 0; }
// WASD / ФЫВЦ
    if (keys.has("w") || keys.has("ц")) forward += 1;
    if (keys.has("s") || keys.has("ы")) forward -= 1;
    if (keys.has("a") || keys.has("ф")) strafe -= 1;
    if (keys.has("d") || keys.has("в")) strafe += 1;

    // стрелки
    if (keys.has("arrowup")) forward += 1;
    if (keys.has("arrowdown")) forward -= 1;

    // виртуальные джойстики
    strafe += virtualAxes.moveX;
    forward += -virtualAxes.moveY;
    turn += virtualAxes.lookX;

    const alt = keys.has("alt");
    if (keys.has("arrowleft")) {
      if (alt) strafe -= 1;
      else turn -= 1;
    }
    if (keys.has("arrowright")) {
      if (alt) strafe += 1;
      else turn += 1;
    }

    const stickRun = (mobileAxes.lookY > 0.45);
    const running = keys.has("shift") || stickRun;
    const speedMul = (running ? PLAYER_RUN_MULT : 1) * (player.speedBoostT > 0 ? 2 : 1);
    const spd = PLAYER_BASE_SPEED * speedMul;

    // Плавный поворот камеры: клавиши + mouselook
    const TURN_ACCEL_TIME = 0.025;
    const TURN_DECEL_TIME = 0.025;
    const TURN_INERTIA_TIME = 0.025;
    const KEY_TURN_SPEED = 3.0;
    const MOUSE_MAX_TURN_SPEED = 12.0;

    const hasTurnInput = Math.abs(turn) > 0.0001;
    if (hasTurnInput) {
      player.lastTurnDir = Math.sign(turn);
      player.turnKeyInertiaT = TURN_INERTIA_TIME;
      player.turnKeyV = approachParabolic(player.turnKeyV || 0, turn, dt, TURN_ACCEL_TIME, TURN_DECEL_TIME);
    } else {
      let turnTarget = 0;
      if ((player.turnKeyInertiaT || 0) > 0 && Math.abs(player.lastTurnDir || 0) > 0) {
        turnTarget = player.lastTurnDir;
        player.turnKeyInertiaT = Math.max(0, (player.turnKeyInertiaT || 0) - dt);
      }
      player.turnKeyV = approachParabolic(player.turnKeyV || 0, turnTarget, dt, TURN_ACCEL_TIME, TURN_DECEL_TIME);
    }

    const mouseTurnTargetRaw = clamp((rawMouseDX * MOUSE_SENS) / Math.max(dt, 1/240), -MOUSE_MAX_TURN_SPEED, MOUSE_MAX_TURN_SPEED);
    rawMouseDX = 0;
    if (Math.abs(mouseTurnTargetRaw) > 0.0001) {
      player.lastMouseTurnTarget = mouseTurnTargetRaw;
      player.mouseTurnInertiaT = TURN_INERTIA_TIME;
      player.mouseTurnV = approachParabolic(player.mouseTurnV || 0, mouseTurnTargetRaw, dt, TURN_ACCEL_TIME, TURN_DECEL_TIME);
    } else {
      let mouseTarget = 0;
      if ((player.mouseTurnInertiaT || 0) > 0 && Math.abs(player.lastMouseTurnTarget || 0) > 0.0001) {
        mouseTarget = player.lastMouseTurnTarget;
        player.mouseTurnInertiaT = Math.max(0, (player.mouseTurnInertiaT || 0) - dt);
      }
      player.mouseTurnV = approachParabolic(player.mouseTurnV || 0, mouseTarget, dt, TURN_ACCEL_TIME, TURN_DECEL_TIME);
    }

    player.a = wrapAngle(player.a + ((player.turnKeyV || 0) * KEY_TURN_SPEED + (player.mouseTurnV || 0)) * dt);

    const fx = Math.cos(player.a), fy = Math.sin(player.a);
    const rx = Math.cos(player.a + Math.PI/2), ry = Math.sin(player.a + Math.PI/2);

    // Movement ramp:
// - Accel: linear 0 -> full in 0.25s
// - Release: linear decel from current speed to 0 in 0.25s
// - Inertia: after releasing movement keys, keep the last move direction for 0.25s
const MOVE_ACCEL_TIME = 0.25;
const MOVE_DECEL_TIME = 0.25;
const MOVE_INERTIA_TIME = 0.25;

let dirX = fx*forward + rx*strafe;
let dirY = fy*forward + ry*strafe;
const dirLen = Math.hypot(dirX, dirY);
const hasMoveInput = (dirLen > 0.0001);

if (hasMoveInput) {
  dirX /= dirLen; dirY /= dirLen;
  player.lastMoveDirX = dirX;
  player.lastMoveDirY = dirY;
  player.moveInertiaT = MOVE_INERTIA_TIME;
  const step = (MOVE_ACCEL_TIME > 0) ? (dt / MOVE_ACCEL_TIME) : 1;
  player.moveV = Math.min(1, (player.moveV || 0) + step);
} else {
  const step = (MOVE_DECEL_TIME > 0) ? (dt / MOVE_DECEL_TIME) : 1;
  player.moveV = Math.max(0, (player.moveV || 0) - step);

  if ((player.moveInertiaT || 0) > 0 && (player.moveV || 0) > 0 && (Math.hypot(player.lastMoveDirX || 0, player.lastMoveDirY || 0) > 0.0001)) {
    dirX = player.lastMoveDirX;
    dirY = player.lastMoveDirY;
    player.moveInertiaT = Math.max(0, (player.moveInertiaT || 0) - dt);
  } else {
    dirX = 0; dirY = 0;
    player.moveInertiaT = 0;
  }
}

const moveSpd = spd * (player.moveV || 0);
    let vx = dirX * moveSpd * dt;
    let vy = dirY * moveSpd * dt;

    // knockback затухание
    player.knockVX *= Math.pow(0.001, dt);
    player.knockVY *= Math.pow(0.001, dt);
    vx += player.knockVX * dt;
    vy += player.knockVY * dt;

    tryMove(player, vx, vy, moveR);

    // стрельба игрока
    const stickShoot = (mobileAxes.lookY < -0.45);
    const lookStickEl = document.getElementById("lookStick");
    if (lookStickEl) {
      lookStickEl.classList.toggle('is-shooting', !!stickShoot);
      lookStickEl.classList.toggle('is-running', !!stickRun);
    }
    const wantShoot = mouseDown || stickShoot || keys.has(" ") || keys.has("space") || keys.has("spacebar");
    if (wantShoot) playerShoot();

    // обновление стен
    updateWalls(dt);

    // обновление врагов
    updateEnemies(dt);

    // отложенные спавны (после возрождения игрока)
    updateDeferredEnemySpawns();

    // снаряды
    updateBullets(dt);

    // взрывы
    for (let i=explosions.length-1;i>=0;i--){
      explosions[i].t += dt;
      if (explosions[i].t > 0.6) explosions.splice(i,1);
    }

    // вспышки у дула
    for (let i=muzzleFlashes.length-1;i>=0;i--){
      muzzleFlashes[i].t += dt;
      if (muzzleFlashes[i].t > 0.12) muzzleFlashes.splice(i,1);
    }

    // дым
    for (let i=smokePuffs.length-1;i>=0;i--){
      smokePuffs[i].t += dt;
      if (smokePuffs[i].t > 0.55) smokePuffs.splice(i,1);
    }

    // предметы (бобинг) + подбор
    updateItems(dt);

    // респавн очереди врагов
    processRespawns();

    // поддержание количества (на всякий случай) — безопасно
    enforceCounts();
  }

  function processRespawns() {
    // враги
    for (let i=respawnQueue.length-1;i>=0;i--){
      const q = respawnQueue[i];
      if (timeNow < q.at) continue;
      // попытка заспавнить
      const ok = spawnEnemy(q.type);
      if (ok) respawnQueue.splice(i,1);
      else q.at = timeNow + 0.25; // попробуем чуть позже
    }
    // предметы (в этой версии предметы всегда держим количеством, очередь не нужна,
    // но оставим на будущее, если захочешь)
    for (let i=itemRespawnQueue.length-1;i>=0;i--){
      const q = itemRespawnQueue[i];
      if (timeNow < q.at) continue;
      if (spawnItem(q.kind)) itemRespawnQueue.splice(i,1);
      else q.at = timeNow + 0.25;
    }
  }

  function updateItems(dt) {
    for (let i=items.length-1;i>=0;i--){
      const it = items[i];
      it.bob += dt*2.0;
      // подбор
      const d = dist(player.x, player.y, it.x, it.y);
      if (d <= PICKUP_RADIUS) {
        // аптечка при полном HP не подбирается, но "не мешает": предметы без коллизии
        const picked = applyItem(it.kind);
        if (picked) {
          // респавним предмет через 5 секунд, соблюдая правила, но строгое количество обеспечит enforceCounts
          items.splice(i,1);
          itemRespawnQueue.push({kind:it.kind, at: timeNow + ITEM_RESPAWN_DELAY});
        } else {
          // при полном HP: не подбираем, но и не толкаем/не мешаем
        }
      }
    }
  }

  function updateEnemies(dt) {
    // очищаем мёртвых
    for (let i=enemies.length-1;i>=0;i--){
      if (enemies[i].dead) enemies.splice(i,1);
    }

    // враги
    for (const e of enemies) {
      if (e.type === "boss") continue; // safety: boss updates отдельно

      e.meleeCd = Math.max(0, (e.meleeCd||0) - dt);
            e.stunT = Math.max(0, (e.stunT||0) - dt);
// активация: когда враг увидел игрока (LOS). Звук агра — один раз, независимо от того, куда смотрит игрок.
      if (!e.active) {
        if (hasLOS(player.x, player.y, e.x, e.y, ENEMY_AGGRO_RANGE)) {
          e.active = true;
          if (!e.aggroPlayed) {
            e.aggroPlayed = true;
            if (e.type === "melee") SFX.aggroBlue();
            else SFX.aggroRed();
          }
        }
      }

// лёгкий звук врага в радиусе 5 клеток после активации (различим типы)
      if (e.active) {
        
        if ((e.stunT||0) > 0) { /* stunned: no movement */ }
const d = dist(player.x, player.y, e.x, e.y);
        if (d <= 5 && Math.random() < 0.02) {
          // два "тембра"
          if (e.type==="melee") playTone({freq:rand(110,160),type:"triangle",dur:0.05,gain:0.02});
          else playTone({freq:rand(220,320),type:"sine",dur:0.05,gain:0.02});
        }
      }

      // knockback затухание
      e.knockVX *= Math.pow(0.001, dt);
      e.knockVY *= Math.pow(0.001, dt);

      const r = 0.28;
      // AI активен только если активировался
      if (e.active) {
        const los = hasLOS(e.x,e.y, player.x, player.y, ENEMY_AGGRO_RANGE);
        if (los) {
          // поворот к игроку
          const ang = Math.atan2(player.y - e.y, player.x - e.x);
          e.a = ang;

          if (e.type === "melee") {
            // идёт напрямую
            const sp = Math.min(MAX_ENEMY_SPEED, 1.548 * Math.pow(1.05, levelIndex - 1));
            const vxChase = Math.cos(ang) * sp * dt;
            const vyChase = Math.sin(ang) * sp * dt;
            const vxKn = e.knockVX * dt;
            const vyKn = e.knockVY * dt;
            if ((e.stunT||0) > 0) tryMove(e, vxKn, vyKn, r);
            else tryMove(e, vxChase + vxKn, vyChase + vyKn, r);
            // атака ножом если близко (не чаще 0.2/сек => раз в 5 сек)
            const d = dist(player.x, player.y, e.x, e.y);
            if (d < 0.95 && e.meleeCd <= 0) { // melee hit range (reduced x2)
              e.meleeCd = 0.5;
              SFX.knifeHit();
              damagePlayer(1, Math.cos(ang), Math.sin(ang));
                          // recoil: melee enemy is pushed backward (opposite to удару) and stunned like player
              const kback = 3.0; // same impulse as player knockback
              e.knockVX += -Math.cos(ang) * kback;
              e.knockVY += -Math.sin(ang) * kback;
              e.stunT = Math.max(e.stunT||0, HIT_STUN_TIME);
            }

          } else {
            // стрелок держит дистанцию
            const d = dist(player.x, player.y, e.x, e.y);
            let vx = 0, vy = 0;

            // <3 отступает "спиной"
            if (d < 3) {
              vx = -Math.cos(ang);
              vy = -Math.sin(ang);
            } else if (d > 5) {
              // >5 приближается
              vx = Math.cos(ang);
              vy = Math.sin(ang);
            } else {
              // 3–5 стоит и чуть стрейфится
              const side = Math.sin(timeNow*2 + e.id) * 0.7;
              vx = Math.cos(ang + Math.PI/2) * side;
              vy = Math.sin(ang + Math.PI/2) * side;
            }

            const sp = Math.min(MAX_ENEMY_SPEED, 1.26 * Math.pow(1.05, levelIndex - 1));
            const vxChase = (vx*sp*dt);
            const vyChase = (vy*sp*dt);
            const vxKn = e.knockVX * dt;
            const vyKn = e.knockVY * dt;
            if ((e.stunT||0) > 0) tryMove(e, vxKn, vyKn, r);
            else tryMove(e, vxChase + vxKn, vyChase + vyKn, r);
            // зарядка и выстрел (1.0 сек)
            e.shootCd -= dt;
            if (e.shootCd <= 0) {
              // "зарядка" — визуально будет в рендере по e.charging
              e.charging = 0.5; // полсек индикатор
              SFX.shooterCharge();
              e.shootCd = SHOOTER_INTERVAL;
              // выпускаем снаряд с небольшой задержкой (как будто зарядился)
              // упрощённо: через 0.1 сек реальный выстрел
              setTimeout(() => {
                // если враг жив и всё ещё на карте
                if (!enemies.find(x=>x.id===e.id)) return;
                const dirX = Math.cos(ang), dirY = Math.sin(ang);
                fireBullet(e.x + dirX*0.3, e.y + dirY*0.3, dirX, dirY, "shoot");
              }, 100);
            }
            e.charging = Math.max(0, e.charging - dt);
          }
        } else {
          // LOS нет — блуждает
          e.wanderT -= dt;
          if (e.wanderT <= 0) {
            e.wanderT = rand(0.6, 1.6);
            e.wanderA = rand(-Math.PI, Math.PI);
          }
          const sp = Math.min(MAX_ENEMY_SPEED, (e.type==="melee" ? 1.116 : 0.972) * Math.pow(1.05, levelIndex - 1));
          const vxW = Math.cos(e.wanderA)*sp*dt;
          const vyW = Math.sin(e.wanderA)*sp*dt;
          const vxKn = e.knockVX*dt;
          const vyKn = e.knockVY*dt;
          if ((e.stunT||0) > 0) tryMove(e, vxKn, vyKn, r);
          else tryMove(e, vxW + vxKn, vyW + vyKn, r);
        }
      } else {
        // спит — не двигается
      }
    }

    // Босс
    if (boss && !boss.dead) {
      // boss knockback/stun timers
      boss.stunT = Math.max(0, (boss.stunT||0) - dt);
      boss.meleeCd = Math.max(0, (boss.meleeCd||0) - dt);
      boss.knockVX *= Math.pow(0.001, dt);
      boss.knockVY *= Math.pow(0.001, dt);
      // звук босса: всегда слышен, громкость зависит от дистанции
      const dCells = dist(player.x, player.y, boss.x, boss.y);
      updateBossDrone(dCells);

      // преследование всегда (босс «чует» игрока на любом расстоянии)
      // Выбираем следующий шаг по самому короткому пути.
      // Если на кратчайшем пути есть разрушаемая стена — босс предпочитает проломить её, а не обходить.
      const r = 0.45;
      const sp = Math.min(MAX_ENEMY_SPEED, boss.speed * (1 + boss.speedBonus));

      const step = bossNextStepTowardPlayer();
      if (step) {
        // направление к центру следующей клетки
        const tx = step.x + 0.5, ty = step.y + 0.5;
        const ang = Math.atan2(ty - boss.y, tx - boss.x);
        boss.a = ang;

        // если следующая клетка — разрушаемая стена, ломаем её (обычные стены НЕ трогаем)
        if (inBounds(step.x, step.y) && map[step.y][step.x] === TILE.BREAK && !wallStates[step.y][step.x].destroyed) {
          // ломаем ТОЛЬКО когда подошли вплотную (в 1 клетке)
          const wx = step.x + 0.5, wy = step.y + 0.5;
          if (dist(boss.x, boss.y, wx, wy) <= 1.05) destroyWallCell(step.x, step.y);
        }

        const vxChase = Math.cos(ang) * sp * dt;
        const vyChase = Math.sin(ang) * sp * dt;
        const vxKn = boss.knockVX * dt;
        const vyKn = boss.knockVY * dt;
        if ((boss.stunT||0) > 0) {
          // stunned: only knockback motion
          tryMove(boss, vxKn, vyKn, r);
        } else {
          tryMove(boss, vxChase + vxKn, vyChase + vyKn, r);
        }
} else {
        // fallback: просто смотрим на игрока
        const ang = Math.atan2(player.y - boss.y, player.x - boss.x);
        boss.a = ang;
      }
      const ang = boss.a;

      // атака стрельбой: 0.5 сек
      boss.shootCd -= dt;
      if (boss.shootCd <= 0) {
        boss.charging = 0.25; // видимая зарядка
        SFX.shooterCharge();
        boss.shootCd = BOSS_INTERVAL;

        // стреляет по очереди из двух пушек: реализуем как 2 коротких выстрела с микрозадержкой
        const left = (boss.gunSide < 0);
        boss.gunSide *= -1;
        const dirX = Math.cos(ang), dirY = Math.sin(ang);
        const off = left ? -0.25 : 0.25;
        const ox = Math.cos(ang + Math.PI/2)*off;
        const oy = Math.sin(ang + Math.PI/2)*off;
        setTimeout(() => {
          if (!boss || boss.dead) return;
          muzzleFlashes.push({x: boss.x + ox*1.4 + dirX*0.55, y: boss.y + oy*1.4 + dirY*0.55, t: 0});
          fireBullet(boss.x + ox*1.4 + dirX*0.6, boss.y + oy*1.4 + dirY*0.6, dirX, dirY, "boss");
        }, 80);
      }
      boss.charging = Math.max(0, boss.charging - dt);
      // рукопашная атака (как у melee-врага), но сильнее: -2 HP
      if (dCells < 0.95 && (boss.meleeCd||0) <= 0) {
        boss.meleeCd = 0.65;
        SFX.knifeHit();
        damagePlayer(2, Math.cos(ang), Math.sin(ang));
      }
    }
  }

  
  /***********************
   *  Разведение сущностей (объём игрока и отсутствие наслаивания)
   ***********************/
  function radiusForEntity(ent) {
    if (!ent) return 0.35;
    if (ent === boss) return 0.45;
    return 0.35; // обычные враги
  }

  function nudgeOutOfWall(ent, r, dx, dy) {
    // если после разведения попали в стену — откатываем маленькими шагами
    if (!circleCollidesWall(ent.x, ent.y, r)) return;
    const len = Math.hypot(dx, dy) || 1;
    const ux = dx/len, uy = dy/len;
    for (let i=0;i<6;i++){
      ent.x -= ux * 0.03;
      ent.y -= uy * 0.03;
      if (!circleCollidesWall(ent.x, ent.y, r)) return;
    }
  }

  function resolveEntitySeparation() {
    // 1) враги не залезают в игрока
    const playerR = 0.25; // тот же, что moveR
    for (const e of enemies) {
      if (e.type === "boss") continue; // safety: boss updates отдельно

      const r = radiusForEntity(e);
      let dx = e.x - player.x, dy = e.y - player.y;
      let d = Math.hypot(dx,dy);
      const min = playerR + r + 0.06;
      if (d < min) {
        if (d < 0.0001) { dx = 1; dy = 0; d = 1; }
        const push = (min - d);
        const ux = dx/d, uy = dy/d;
        e.x += ux * push;
        e.y += uy * push;
        // анти-"прилипание": лёгкий сдвиг по касательной, чтобы враг не стоял идеально в упоре
        const tx = -uy, ty = ux;
        const jig = 0.015 * ( (e.id % 2) ? 1 : -1 );
        e.x += tx * jig;
        e.y += ty * jig;
        nudgeOutOfWall(e, r, dx, dy);
      }
    }
    if (boss && !boss.dead) {
      const r = radiusForEntity(boss);
      let dx = boss.x - player.x, dy = boss.y - player.y;
      let d = Math.hypot(dx,dy);
      const min = playerR + r + 0.08;
      if (d < min) {
        if (d < 0.0001) { dx = 1; dy = 0; d = 1; }
        const push = (min - d);
        boss.x += (dx/d) * push;
        boss.y += (dy/d) * push;
        nudgeOutOfWall(boss, r, dx, dy);
      }
    }

    // 2) враги не наслаиваются друг на друга (и на босса)
    const ents = enemies.slice();
    if (boss && !boss.dead) ents.push(boss);
    for (let i=0;i<ents.length;i++){
      for (let j=i+1;j<ents.length;j++){
        const a = ents[i], b = ents[j];
        const ra = radiusForEntity(a), rb = radiusForEntity(b);
        let dx = b.x - a.x, dy = b.y - a.y;
        let d = Math.hypot(dx,dy);
        const min = ra + rb + 0.05;
        if (d < min) {
          if (d < 0.0001) { dx = 1; dy = 0; d = 1; }
          const push = (min - d) * 0.5;
          const ux = dx/d, uy = dy/d;

          // двигаем обоих (кроме босса можно двигать тоже — он тяжёлый, но пусть всё равно расходится)
          a.x -= ux * push; a.y -= uy * push;
          b.x += ux * push; b.y += uy * push;

          nudgeOutOfWall(a, ra, -dx, -dy);
          nudgeOutOfWall(b, rb, dx, dy);
        }
      }
    }
  }

function updateBullets(dt) {
    for (let i=bullets.length-1;i>=0;i--){
      const b = bullets[i];

      // дальность: максимум ENEMY_SHOT_RANGE клеток
      if (b.travel >= ENEMY_SHOT_RANGE) { bullets.splice(i,1); continue; }

      // лёгкая реактивная акселерация (как у ракеты), но с ограничением
      const accel = 3.2; // cells/sec^2
      const maxMul = 1.35;
      const base = (b.owner==="boss" ? 5.0 : 4.0) * 1.5;
      b.speed = Math.min(base*maxMul, b.speed + accel*dt);

      // "живая" траектория: маленькое дрожание по перпендикуляру (ракета не летит идеально ровно)
      const wobble = 0.12 * Math.sin(b.phase); // доля от скорости по перпендикуляру
      b.phase += dt * 14.0;

      const px = -b.dy, py = b.dx; // перпендикуляр
      const vx = b.dx*b.speed + px*b.speed*wobble;
      const vy = b.dy*b.speed + py*b.speed*wobble;

      const nx = b.x + vx*dt;
      const ny = b.y + vy*dt;


      // дымовой хвост: небольшие "пухи" по траектории (не перегружаем, спавним редко)
      b.smT = (b.smT||0) + dt;
      if (b.smT >= 0.05) {
        b.smT = 0;
        const back = 0.18;
        smokePuffs.push({x: b.x - b.dx*back, y: b.y - b.dy*back, t: 0});
      }


      // столкновение со стеной
      if (isSolidTile(tileAt(nx,ny))) {
        bullets.splice(i,1);
        // небольшая вспышка на месте попадания
        explosions.push({x:nx,y:ny,t:0});
        continue;
      }

      // попадание в игрока:
      // хитбокс ракет красного врага и босса одинаковый: 0.25 клетки
      const HIT_RANGE = 0.25;
      if (dist2(nx,ny, player.x, player.y) < (HIT_RANGE*HIT_RANGE)) {
        const vlen = Math.hypot(vx,vy) || 1;
        damagePlayer(1, vx/vlen, vy/vlen);
        bullets.splice(i,1);
        explosions.push({x:nx,y:ny,t:0});
        continue;
      }

      b.x = nx; b.y = ny;
      b.travel += b.speed * dt;
    }
  }



  /***********************
   *  Рейкастинг
   ***********************/
  const FOV = Math.PI * 0.318; // ~57° tuned for portrait 3:4
  
  const PROJ_PLANE = (RENDER_W/2) / Math.tan(FOV/2); // projection plane distance (px)
  const GROUND_LINE = (RENDER_H/2) + 24; // where sprites stand (matches previous offset)
function castRay(angle) {
    // DDA по сетке
    const rayDirX = Math.cos(angle);
    const rayDirY = Math.sin(angle);

    let mapX = Math.floor(player.x);
    let mapY = Math.floor(player.y);

    const deltaDistX = Math.abs(1 / (rayDirX || 1e-6));
    const deltaDistY = Math.abs(1 / (rayDirY || 1e-6));

    let stepX, stepY;
    let sideDistX, sideDistY;

    if (rayDirX < 0) {
      stepX = -1;
      sideDistX = (player.x - mapX) * deltaDistX;
    } else {
      stepX = 1;
      sideDistX = (mapX + 1.0 - player.x) * deltaDistX;
    }
    if (rayDirY < 0) {
      stepY = -1;
      sideDistY = (player.y - mapY) * deltaDistY;
    } else {
      stepY = 1;
      sideDistY = (mapY + 1.0 - player.y) * deltaDistY;
    }

    let hit = 0;
    let side = 0; // 0 x-side, 1 y-side
    let maxSteps = 80;

    while (hit === 0 && maxSteps-- > 0) {
      if (sideDistX < sideDistY) {
        sideDistX += deltaDistX;
        mapX += stepX;
        side = 0;
      } else {
        sideDistY += deltaDistY;
        mapY += stepY;
        side = 1;
      }
      if (!inBounds(mapX,mapY)) { hit = TILE.WALL; break; }
      const t = tileAt(mapX+0.0001, mapY+0.0001);
      if (isSolidTile(t)) hit = t;
    }

    // расстояние до стены без fish-eye: перпендикулярная дистанция
    let perpWallDist;
    if (side === 0) perpWallDist = (mapX - player.x + (1 - stepX)/2) / (rayDirX || 1e-6);
    else           perpWallDist = (mapY - player.y + (1 - stepY)/2) / (rayDirY || 1e-6);

    // координата по текстуре
    let wallX;
    if (side === 0) wallX = player.y + perpWallDist * rayDirY;
    else           wallX = player.x + perpWallDist * rayDirX;
    wallX -= Math.floor(wallX);

    return { dist: Math.max(0.0001, perpWallDist), hit, side, wallX, mapX, mapY };
  }

   *  Отрисовка
   ***********************/
  function render() {
    // Рендерим в view (низкое разрешение)
    vctx.imageSmoothingEnabled = false;
    vctx.clearRect(0,0,RENDER_W,RENDER_H);

    if (gameState === STATE.MENU || gameState === STATE.SCOREBOARD) {
      drawMenu();
    } else if (gameState === STATE.GAMEOVER_ENTRY) {
      drawGameOverEntry();
    } else {
      draw3D();
      if (gameState === STATE.PAUSED) drawPauseOverlay();
    }

    // Масштабируем на главный canvas
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const scale = Math.floor(Math.min(canvas.width / RENDER_W, canvas.height / RENDER_H));
    const w = RENDER_W * scale;
    const h = RENDER_H * scale;
    const x = Math.floor((canvas.width - w)/2);
    const y = Math.floor((canvas.height - h)/2);
    ctx.drawImage(view, x, y, w, h);
  }

  function drawMenuBossWalk(spr, x, y, w, h){
    // Вместо "парения" — лёгкая походка: корпус почти на месте, ноги шагают.
    const t = performance.now() * 0.010;
    const bodyBob = Math.sin(t * 0.5) * 0.8;
    const sway = Math.sin(t * 0.35) * 1.0;

    const topSrcH = Math.floor(spr.height * 0.69);
    const botSrcY = topSrcH;
    const botSrcH = spr.height - topSrcH;

    const topDstH = Math.floor(h * 0.69);
    const botDstY = y + topDstH;
    const botDstH = h - topDstH;

    const stepA = Math.sin(t) * 2.0;
    const stepB = Math.sin(t + Math.PI) * 2.0;

    // верх корпуса
    vctx.drawImage(spr, 0, 0, spr.width, topSrcH, x + sway, y + bodyBob, w, topDstH);

    // левая и правая половины ног рисуются отдельно с небольшим встречным шагом
    const halfSrcW = Math.floor(spr.width / 2);
    const leftDstW = Math.floor(w / 2);
    const rightDstW = w - leftDstW;

    vctx.drawImage(
      spr,
      0, botSrcY, halfSrcW, botSrcH,
      x + sway, botDstY + stepA, leftDstW, botDstH
    );
    vctx.drawImage(
      spr,
      halfSrcW, botSrcY, spr.width - halfSrcW, botSrcH,
      x + sway + leftDstW, botDstY + stepB, rightDstW, botDstH
    );
  }

  function draw3D() {
    // потолок/пол
    // заполним однотонно, но с текстурой очень просто (полосы + тайл)
    // Сначала базовые заливки
    vctx.fillStyle = "#050505";
    vctx.fillRect(0,0,RENDER_W,RENDER_H);

    // потолок/пол: простая заливка + «думовское» затемнение по дальности
    // Идея: каждой горизонтальной строке соответствует приблизительная дальность до пола/потолка.
    // Радиус света ~5 клеток; начиная с 6-й клетки — полная тьма.
    const halfH = RENDER_H / 2;

    // потолок
    for (let y=0; y<halfH; y++) {
      const t = y/halfH;
      const c = 18 - Math.floor(t*14);
      vctx.fillStyle = `rgb(${c},${c},${c+2})`;
      vctx.fillRect(0,y,RENDER_W,1);

      const denom = (halfH - y);
      const rowDist = (halfH / (denom + 1e-6)) * 0.5; // клетки
      const dark = darknessByDist(rowDist);
      if (dark > 0) {
        vctx.fillStyle = `rgba(0,0,0,${dark*MAX_DARK_ALPHA})`;
        vctx.fillRect(0,y,RENDER_W,1);
      }
    }

    // пол
    for (let y=halfH; y<RENDER_H; y++) {
      const t = (y-halfH)/halfH;
      const c = 12 - Math.floor(t*8);
      vctx.fillStyle = `rgb(${c},${c-1},${c-2})`;
      vctx.fillRect(0,y,RENDER_W,1);

      const denom = (y - halfH);
      const rowDist = (halfH / (denom + 1e-6)) * 0.5; // клетки
      const dark = darknessByDist(rowDist);
      if (dark > 0) {
        vctx.fillStyle = `rgba(0,0,0,${dark*MAX_DARK_ALPHA})`;
        vctx.fillRect(0,y,RENDER_W,1);
      }
    }


    // стены (рейкаст)
    const zBuffer = new Float32Array(RENDER_W);

    for (let x=0; x<RENDER_W; x++) {
      const camX = (2*x/RENDER_W - 1);
      const rayA = player.a + camX * (FOV/2);
      const r = castRay(rayA);
      const d = r.dist;
      zBuffer[x] = d;

      const lineH = Math.floor(RENDER_H / d);
      const drawStart = Math.floor(RENDER_H/2 - lineH/2);
      const drawEnd = Math.floor(RENDER_H/2 + lineH/2);

      // выбор текстуры (обычная/разрушаемая)
      let tex = textures.wall;
      if (r.hit === TILE.BREAK) tex = textures.breakWall;

      // если разрушаемая и уничтожена — она не попадёт в hit (tileAt вернёт EMPTY), так что не здесь
      // но если хитнули разрушаемую, которая в состоянии "destroyed=false" — ок.

      // текстурная колонка
      const texX = Math.floor(r.wallX * TEX_SIZE);

      // чуть затемняем сторону
      const shade = (r.side === 1) ? 0.70 : 0.85;

      // рисуем колонкой
      const srcX = texX, srcW = 1;
      const destW = 1;
      const srcY0 = 0, srcH = TEX_SIZE;

      // растягиваем один пиксель ширины на высоту стены
      // (для скорости — drawImage с 1px колонкой)
      vctx.globalAlpha = shade;
      vctx.drawImage(tex, srcX, srcY0, srcW, srcH, x, drawStart, destW, drawEnd - drawStart);
      vctx.globalAlpha = 1;
      // Освещение/тьма по дальности (как фонарик): 0..5 клеток — темнеет, 6+ — тьма
      const dark = darknessByDist(d);
      if (dark > 0) {
        vctx.fillStyle = `rgba(0,0,0,${dark*MAX_DARK_ALPHA})`;
        vctx.fillRect(x, drawStart, 1, drawEnd-drawStart);
      }
// если это клетка разрушаемой стены, которая разрушена — мы её не видим
      // но добавим "анимацию разрушения" в виде частиц при разрушении отдельно (см. ниже).
      if (r.hit === TILE.BREAK) {
        const st = wallStates[r.mapY][r.mapX];
        if (st.destroyed) {
          // не должно случиться, но на всякий — фейд
          vctx.fillStyle="rgba(0,0,0,0.7)";
          vctx.fillRect(x, drawStart, 1, drawEnd-drawStart);
        }
      }
    }

    // обновим глобальный z-buffer для рендера спрайтов
    zBuf = zBuffer;

    // Нарисуем разрушение стен как «пыль» — пробежимся по wallStates
    // (очень дешево: несколько пикселей)
    for (let y=1;y<MAP_H-1;y++){
      for (let x=1;x<MAP_W-1;x++){
        if (map[y][x] !== TILE.BREAK) continue;
        const st = wallStates[y][x];
        if (!st.destroyed) continue;
        // «пыль» первые 0.2 сек
        if (st.destroyAnim < 1) {
          // проецируем центр клетки как спрайт-пыль (очень грубо)
          // найдём угол до клетки
          const cx = x+0.5, cy=y+0.5;
          const dx = cx - player.x, dy = cy - player.y;
          const ang = wrapAngle(Math.atan2(dy,dx) - player.a);
          if (Math.abs(ang) > FOV/2) continue;
          const d = Math.sqrt(dx*dx+dy*dy);
          const screenX = Math.floor((ang/(FOV/2) * 0.5 + 0.5) * RENDER_W);
          const size = clamp(Math.floor(50 / (d+0.1)), 2, 12);
          const yMid = Math.floor(RENDER_H/2);
          const alpha = (1-st.destroyAnim) * 0.6;
          vctx.fillStyle = `rgba(200,200,200,${alpha})`;
          for (let i=0;i<8;i++){
            vctx.fillRect(screenX + randi(-size,size), yMid + randi(-size,size), 1, 1);
          }
        }
      }
    }

    // Сущности (billboards): враги, предметы, пули, взрывы
    drawBillboards(zBuffer);

    // HUD
    drawHUD();

    // Вспышки
    if (player.pickupFlash.t > 0) {
      const a = clamp(player.pickupFlash.t, 0, 1) * 0.25;
      vctx.fillStyle = `rgba(${player.pickupFlash.r},${player.pickupFlash.g},${player.pickupFlash.b},${a})`;
      vctx.fillRect(0,0,RENDER_W,RENDER_H);
    }
    if (player.hurtFlash > 0) {
      const a = player.hurtFlash * 0.35;
      vctx.fillStyle = `rgba(255,0,0,${a})`;
      vctx.fillRect(0,0,RENDER_W,RENDER_H);
    }

    // Оружие (внизу)
    drawWeapon();
  }

  function drawHUD() {
    // HP / Kills
    vctx.fillStyle="#000";
    vctx.globalAlpha=0.55;
    vctx.fillRect(6,6,92,32);
    vctx.globalAlpha=1;

    vctx.fillStyle="#fff";
    vctx.font="10px system-ui";
    vctx.fillText(`HP ${player.hp}/${PLAYER_MAX_HP}`, 12, 20);
    vctx.fillText(`KILLS ${killsTotal}`, 12, 34);

    // шкалы усилений (без цифр)
    let barY = 44;
    function bar(t, color) {
      if (t <= 0) return;
      const w = 80;
      const p = clamp(t / POWERUP_DURATION, 0, 1);
      vctx.fillStyle="rgba(0,0,0,0.55)";
      vctx.fillRect(10, barY, w, 6);
      vctx.fillStyle=color;
      vctx.fillRect(10, barY, Math.floor(w*p), 6);
      barY += 10;
    }
    bar(player.speedBoostT, "#35ff88");
    bar(player.dmgBoostT,   "#ff4444");
    bar(player.invulnT,     "#dfefff");

    // шкала HP босса над боссом (в 3D — проще показать сверху экрана, чтобы всегда было видно)
    if (boss && !boss.dead) {
      const w = 120, h=6;
      const p = clamp(boss.hp / boss.hpMax, 0, 1);
      vctx.fillStyle="rgba(0,0,0,0.65)";
      vctx.fillRect((RENDER_W-w)/2, 8, w, h);
      vctx.fillStyle="#ff3333";
      vctx.fillRect((RENDER_W-w)/2, 8, Math.floor(w*p), h);
      vctx.strokeStyle="rgba(255,255,255,0.25)";
      vctx.strokeRect((RENDER_W-w)/2, 8, w, h);
    }

    // прицел (увеличенный и красный при двойном уроне)
    const cx = (RENDER_W/2)|0, cy = (RENDER_H/2)|0;
    const big = player.dmgBoostT > 0;
    vctx.strokeStyle = big ? "#ff3333" : "rgba(255,255,255,0.65)";
    vctx.lineWidth = 1;
    const s = big ? 7 : 5;
    vctx.beginPath();
    vctx.moveTo(cx-s, cy); vctx.lineTo(cx-2, cy);
    vctx.moveTo(cx+2, cy); vctx.lineTo(cx+s, cy);
    vctx.moveTo(cx, cy-s); vctx.lineTo(cx, cy-2);
    vctx.moveTo(cx, cy+2); vctx.lineTo(cx, cy+s);
    vctx.stroke();
  }

  function drawWeapon() {
    const spr = (player.weaponKick > 0) ? SPR.weaponFire : SPR.weaponIdle;
    const w = spr.width, h = spr.height;
    const x = (RENDER_W - w)/2;
    const y = RENDER_H - h + (player.weaponKick>0 ? 2 : 0);
    vctx.drawImage(spr, x, y);
  }

  function drawBillboards(zBuffer) {
    const list = [];

    // предметы
    for (const it of items) {
      list.push({ kind:"item", x:it.x, y:it.y, ref:it, dist:dist(player.x,player.y,it.x,it.y) });
    }
    // враги
    for (const e of enemies) {
      if (e.type === "boss") continue; // safety: boss updates отдельно

      list.push({ kind:"enemy", x:e.x, y:e.y, ref:e, dist:dist(player.x,player.y,e.x,e.y) });
    }
    // босс
    if (boss && !boss.dead) {
      list.push({ kind:"boss", x:boss.x, y:boss.y, ref:boss, dist:dist(player.x,player.y,boss.x,boss.y) });
    }
    // пули
    for (const b of bullets) {
      list.push({ kind:"bullet", x:b.x, y:b.y, ref:b, dist:dist(player.x,player.y,b.x,b.y) });
    }
    // взрывы
    for (const ex of explosions) {
      list.push({ kind:"expl", x:ex.x, y:ex.y, ref:ex, dist:dist(player.x,player.y,ex.x,ex.y) });
    }
    // вспышки (у дула)
    for (const mf of muzzleFlashes) {
      list.push({ kind:"flash", x:mf.x, y:mf.y, ref:mf, dist:dist(player.x,player.y,mf.x,mf.y) });
    }
    // дымовой хвост
    for (const sp of smokePuffs) {
      list.push({ kind:"smoke", x:sp.x, y:sp.y, ref:sp, dist:dist(player.x,player.y,sp.x,sp.y) });
    }

    // рисуем от дальних к ближним
    list.sort((a,b)=>b.dist - a.dist);

    for (const o of list) {
      const dx = o.x - player.x;
      const dy = o.y - player.y;
      const ang = wrapAngle(Math.atan2(dy,dx) - player.a);
      if (Math.abs(ang) > FOV/2) continue;

      const d = Math.sqrt(dx*dx+dy*dy);
      // на дистанции 6 клеток и дальше врагов/предметов НЕ видно (чтобы не было силуэтов в дальнем коридоре)
      if ((o.kind === "enemy" || o.kind === "boss" || o.kind === "item") && d >= 6.0) continue;
      const dPerp = d * Math.cos(ang);
      if (dPerp <= 0.0001) continue;
      // позиция на экране
      const sx = (ang/(FOV/2) * 0.5 + 0.5) * RENDER_W;

      // Частичная окклюзия спрайтов делается по колонкам в drawSpriteOccluded (естественное "выглядывание" из-за угла)

      if (o.kind === "enemy") {
        drawEnemySprite(o.ref, sx, dPerp);
      } else if (o.kind === "boss") {
        drawBossSprite(o.ref, sx, dPerp);
      } else if (o.kind === "item") {
        drawItemSprite(o.ref, sx, dPerp, o.dist);
      } else if (o.kind === "bullet") {
        drawBullet(o.ref, sx, dPerp);
      } else if (o.kind === "expl") {
        drawExplosion(o.ref, sx, dPerp);
      } else if (o.kind === "flash") {
        drawMuzzleFlash(o.ref, sx, dPerp);
      } else if (o.kind === "smoke") {
        drawSmokePuff(o.ref, sx, dPerp);
      }
    }
  }

  function chooseFacingSprite(entityX, entityY, sprFront, spr45) {
    // 2 проекции: фронт и 45°, третья зеркалом 45°
    const angToPlayer = Math.atan2(player.y - entityY, player.x - entityX);
    const rel = wrapAngle(angToPlayer - player.a);
    // Если ближе к фронту — фронт, иначе боковая
    if (Math.abs(rel) < 0.35) return {spr:sprFront, flip:false};
    // если слева/справа — 45°, а направление решаем флипом
    const flip = rel < 0; // левее — зеркалим
    return {spr:spr45, flip};
  }

  // Экранная координата "пола" (нижняя кромка стены высотой 1 клетка) для данной дистанции.
  // Это убирает эффект "взлёта": спрайт всегда стоит на полу и не уезжает к потолку на дальнем расстоянии.
  function groundYForDist(dPerp) {
    const d = Math.max(dPerp, 0.0001);
    const wallScreenH = (1.0 * PROJ_PLANE) / d; // 1 клетка = высота стены
    return (RENDER_H * 0.5) + (wallScreenH * 0.5);
  }

  function groundYClamped(dPerp) {
    // В очень близких дистанциях groundYForDist может уходить ниже экрана (стена "в лицо"),
    // из-за чего спрайты визуально "проваливаются". Клампим "пол" в пределах экрана.
    return Math.min(RENDER_H - 1, groundYForDist(dPerp));
  }
  // Рисуем спрайт «полосами» (по 1px) с учётом z-buffer стен.
  // Это даёт естественное «выглядывание из-за угла»: часть спрайта, закрытая стеной, не рисуется.
  function drawSpriteOccluded(spr, xCenter, yTop, w, h, dPerp, flip=false, alpha=1) {
    if (!spr || !zBuf) {
      vctx.globalAlpha = alpha;
      if (flip) {
        vctx.save();
        vctx.translate(xCenter, yTop);
        vctx.scale(-1, 1);
        vctx.drawImage(spr, -w/2, 0, w, h);
        vctx.restore();
      } else {
        vctx.drawImage(spr, xCenter - w/2, yTop, w, h);
      }
      vctx.globalAlpha = 1;
      return;
    }

    // горизонтальный клип по экрану
    const x0 = Math.floor(xCenter - w/2);
    const x1 = Math.floor(xCenter + w/2);
    if (x1 <= 0 || x0 >= RENDER_W) return;

    const span = Math.max(1, (x1 - x0));
    const invSpan = 1 / span;

    const prevA = vctx.globalAlpha;
    vctx.globalAlpha = alpha;

    const startX = Math.max(0, x0);
    const endX = Math.min(RENDER_W, x1);

    // вертикальный клип по экрану (критично для очень близких крупных спрайтов — иначе drawImage пытается рисовать гигантские масштабы)
    const y0 = yTop;
    const y1 = yTop + h;
    const clipY0 = Math.max(0, Math.floor(y0));
    const clipY1 = Math.min(RENDER_H, Math.ceil(y1));
    const drawH = clipY1 - clipY0;
    if (drawH <= 0) { vctx.globalAlpha = prevA; return; }

    const srcY = ((clipY0 - y0) / h) * spr.height;
    const srcH = (drawH / h) * spr.height;

    for (let x = startX; x < endX; x++) {
      // Если стена ближе — не рисуем этот «столбик» спрайта.
      if (dPerp > zBuf[x] - 0.02) continue;

      const u = (x - x0) * invSpan; // 0..1
      let texX = (u * spr.width) | 0;
      texX = clamp(texX, 0, spr.width - 1);
      if (flip) texX = (spr.width - 1) - texX;

      // затемнение спрайта по дальности:
      // ВАЖНО: нельзя затемнять через source-atop поверх экрана — на непрозрачном фоне это даёт "чёрный квадрат".
      // Вместо этого уменьшаем альфу самих пикселей спрайта: фон остаётся нетронутым.
      const sd = darknessByDist(dPerp);
      if (sd > 0) {
        const a = Math.min(0.85, sd * MAX_DARK_ALPHA); // 0..0.85
        const prevGA = vctx.globalAlpha;
        vctx.globalAlpha = prevGA * (1 - a);
        vctx.drawImage(spr, texX, srcY, 1, srcH, x, clipY0, 1, drawH);
        vctx.globalAlpha = prevGA;
      } else {
        vctx.drawImage(spr, texX, srcY, 1, srcH, x, clipY0, 1, drawH);
      }
}

    vctx.globalAlpha = prevA;
  }


  function drawEnemySprite(e, sx, d) {
    let sprFront, spr45;
    if (e.type==="melee") { sprFront = SPR.monkKnifeF; spr45 = SPR.monkKnife45; }
    else { sprFront = SPR.monkRocketF; spr45 = SPR.monkRocket45; }
  
    const face = chooseFacingSprite(e.x,e.y, sprFront, spr45);
    const spr = face.spr;
  
    // Correct billboard projection:
    // wall height is 1 cell, so enemy height is ~0.9–1.0 cells.
    const worldH = (e.type==="melee") ? 0.95 : 0.90;
    const gy = groundYClamped(d);
    const maxH = Math.max(10, Math.min(RENDER_H * 0.98, gy - 2)); // keep feet on floor, avoid flying/ceiling clipping
    const screenH = clamp((worldH * PROJ_PLANE) / Math.max(d, 0.0001), 6, maxH);
    const scale = screenH / spr.height;
  
    const w = spr.width * scale;
    const h = spr.height * scale;
    const x = sx - w/2;
    const y = gy - h;

    drawSpriteOccluded(spr, sx, y, w, h, d, face.flip, 1);
  
    // charge indicator for shooter (occluded by walls)
if (e.type==="shoot" && e.charging>0) {
  const a = clamp(e.charging/0.5,0,1);
  const xi0 = Math.floor(sx-3), xi1 = Math.floor(sx+3);
  let visible = true;
  if (zBuf) {
    visible = false;
    for (let xx = xi0; xx <= xi1; xx++) {
      if (xx < 0 || xx >= RENDER_W) continue;
      if (d <= zBuf[xx] - 0.02) { visible = true; break; }
    }
  }
  if (visible) {
    vctx.fillStyle = `rgba(120,220,255,${0.30*a})`;
    vctx.fillRect(sx-3, y + h*0.38, 6, 6);
  }
}
  }

  function drawBossSprite(b, sx, d) {
    const face = chooseFacingSprite(b.x,b.y, SPR.bossF, SPR.boss45);
    const spr = face.spr;
  
    // Boss is taller than wall (~1.6–1.8 cells).
    const worldH = 1.70;
    const gy = groundYClamped(d);
    const maxH = Math.max(14, RENDER_H * 1.25); // allow very tall boss without near-distance shrinkingn't shoot past the ceiling
    const screenH = clamp((worldH * PROJ_PLANE) / Math.max(d, 0.0001), 10, maxH);
    const scale = screenH / spr.height;
  
    const w = spr.width * scale;
    const h = spr.height * scale;
    const x = sx - w/2;
    const y = gy - h;

    drawSpriteOccluded(spr, sx, y, w, h, d, face.flip, 1);
  
    // charging dots (occluded by walls)
if (b.charging > 0) {
  const a = clamp(b.charging/0.25,0,1);
  const xi0 = Math.floor(sx-10), xi1 = Math.floor(sx+10);
  let visible = true;
  if (zBuf) {
    visible = false;
    for (let xx = xi0; xx <= xi1; xx++) {
      if (xx < 0 || xx >= RENDER_W) continue;
      if (d <= zBuf[xx] - 0.02) { visible = true; break; }
    }
  }
  if (visible) {
    vctx.fillStyle = `rgba(255,120,120,${0.35*a})`;
    vctx.fillRect(sx-10, y + h*0.40, 6, 6);
    vctx.fillRect(sx+4,  y + h*0.40, 6, 6);
  }
}
  }

  function drawItemSprite(it, sx, d, dist2d) {
    const bob = Math.sin(it.bob) * 3;
    const gy = groundYClamped(d);
  
    let spr = SPR.med;
    if (it.kind==="super") spr = SPR.superMed;
    if (it.kind==="boots") spr = SPR.boots;
    if (it.kind==="dmg") spr = SPR.biceps;
    if (it.kind==="wings") spr = SPR.wings;
  
    // Items are small (~0.45 cell height).
    const worldH = 0.45;
    const screenH = clamp((worldH * PROJ_PLANE) / Math.max(d, 0.0001), 4, Math.min(RENDER_H * 0.55, gy - 3));
    const scale = screenH / spr.height;
  
    const w = spr.width * scale;
    const h = spr.height * scale;
    const x = sx - w/2;
    const y = (gy - h) + bob;
    // Плавное исчезновение при приближении, чтобы не было ощущения "отталкивания"
    const dd = (typeof dist2d === "number") ? dist2d : dist(player.x, player.y, it.x, it.y);
    let a = 1;
    if (dd < ITEM_FADE_START) {
      a = clamp((dd - PICKUP_RADIUS) / Math.max(ITEM_FADE_START - PICKUP_RADIUS, 0.0001), 0, 1);
    }

    drawSpriteOccluded(spr, sx, y, w, h, d, false, a);
  }

  function drawBullet(b, sx, d) {
    // ВАЖНО: даём ощущение перспективы — ракета маленькая вдали и растёт по мере приближения.
    // Снаряд удаляется при попадании (HIT_RANGE), поэтому здесь лишь слегка прячем "совсем в упоре",
    // чтобы не перекрывал экран гигантским спрайтом на последнем пикселе.
    const db = dist(player.x, player.y, b.x, b.y);
    if (db < 0.18) return;

    // окклюзия по z-buffer (по центральной колонке достаточно — спрайт маленький)
    if (zBuf) {
      const xi = clamp(Math.round(sx), 0, RENDER_W-1);
      if (d > zBuf[xi] - 0.02) return;
    }

    // выбор проекции ракеты по направлению полёта относительно взгляда игрока
    const velA = Math.atan2(b.dy, b.dx);
    const rel = wrapAngle(velA - player.a);

    // dot>0: летит примерно "вперёд" по взгляду игрока; dot<0: "назад"
    const dot = Math.cos(rel);
    let spr = SPR.rocketSide;
    let flip = false;

    if (dot > 0.75) {
      // летит примерно в ту же сторону, куда смотрит игрок → мы видим заднюю часть ракеты
      spr = SPR.rocketBack;
    } else if (dot < -0.75) {
      // летит на игрока → вид "в лоб"
      spr = SPR.rocketFront;
    } else {
      // сбоку: выбираем флип по знаку sin(rel) (слева/справа)
      spr = SPR.rocketSide;
      flip = Math.sin(rel) < 0;
    }

    const gy = groundYClamped(d);

    // Размер на экране:
    // Раньше ракеты почти всегда упирались в верхний clamp и казались "одного размера".
    // Делаем так, чтобы рост был заметен в диапазоне ~6→1 клетка, а у самого игрока размер не раздувался бесконечно.
    // (Максимум оставляем прежним — 36px, чтобы не раздувать баланс/читабельность.)
    let sizePx = clamp((0.23 * PROJ_PLANE) / Math.max(d, 0.0001), 2, 72);
    if (b.owner === 'boss') sizePx *= 2;
    const w = sizePx;
    const h = sizePx;

    // "поднятие" над полом
    const worldZ = (b.owner === 'boss' ? 0.40 : 0.28);
    const lift = (worldZ * PROJ_PLANE) / Math.max(d, 0.0001);
    const y = Math.floor(gy - h - clamp(lift, 2, 48));

    drawSpriteOccluded(spr, sx, y, w, h, d, flip, 1);
  }



  function drawExplosion(ex, sx, d) {
    // не рисуем взрыв сквозь стены (достаточно проверки центральной колонки)
    if (zBuf) {
      const xi = clamp(Math.round(sx), 0, RENDER_W-1);
      if (d > zBuf[xi] - 0.02) return;
    }
    const t = ex.t;
  
    const worldR0 = 0.35; // base radius in cells
    const r0 = (worldR0 * PROJ_PLANE) / Math.max(d, 0.0001);
    const r = clamp((r0 * (1 + t*3.0)), 2, RENDER_H);
  
    const cy = GROUND_LINE - ((0.25 * PROJ_PLANE) / Math.max(d, 0.0001));
  
    vctx.fillStyle = `rgba(255,180,40,${clamp(1-t*1.8,0,1)})`;
    vctx.beginPath(); vctx.arc(sx, cy, r, 0, Math.PI*2); vctx.fill();
  
    vctx.fillStyle = `rgba(255,60,0,${clamp(0.8-t*1.8,0,1)})`;
    vctx.beginPath(); vctx.arc(sx, cy, r*0.65, 0, Math.PI*2); vctx.fill();
  }

  
  function drawMuzzleFlash(mf, sx, d) {
    // не рисуем сквозь стены
    if (zBuf) {
      const xi = clamp(Math.round(sx), 0, RENDER_W-1);
      if (d > zBuf[xi] - 0.02) return;
    }
    const t = mf.t; // 0..0.12
    const k = clamp(1 - t/0.12, 0, 1);
    const gy = groundYClamped(d);
    const lift = (0.42 * PROJ_PLANE) / Math.max(d, 0.0001);
    const cy = Math.floor(gy - clamp(lift, 2, 70));
    const r0 = (0.10 * PROJ_PLANE) / Math.max(d, 0.0001);
    const r = clamp(r0 * (0.9 + (1-k)*0.6), 1, 18);
    vctx.globalAlpha = 0.95 * k;
    vctx.fillStyle = "rgba(255,210,90,1)";
    vctx.beginPath(); vctx.arc(sx, cy, r, 0, Math.PI*2); vctx.fill();
    vctx.globalAlpha = 0.75 * k;
    vctx.fillStyle = "rgba(255,80,0,1)";
    vctx.beginPath(); vctx.arc(sx, cy, r*0.55, 0, Math.PI*2); vctx.fill();
    vctx.globalAlpha = 1;
  }

  function drawSmokePuff(sp, sx, d) {
    // не рисуем сквозь стены
    if (zBuf) {
      const xi = clamp(Math.round(sx), 0, RENDER_W-1);
      if (d > zBuf[xi] - 0.02) return;
    }
    const t = sp.t; // 0..0.55
    const a = clamp(0.55 - t*1.1, 0, 0.55);
    if (a <= 0.01) return;

    const gy = groundYClamped(d);
    const lift = (0.32 * PROJ_PLANE) / Math.max(d, 0.0001);
    const cy = Math.floor(gy - clamp(lift, 2, 60));

    const r0 = (0.12 * PROJ_PLANE) / Math.max(d, 0.0001);
    const r = clamp(r0 * (0.55 + t*1.25), 1, 22);

    vctx.globalAlpha = a;
    vctx.fillStyle = "rgba(120,120,120,1)";
    vctx.beginPath(); vctx.arc(sx, cy, r, 0, Math.PI*2); vctx.fill();
    vctx.globalAlpha = a*0.75;
    vctx.fillStyle = "rgba(70,70,70,1)";
    vctx.beginPath(); vctx.arc(sx + (Math.sin(t*18)*0.6), cy, r*0.65, 0, Math.PI*2); vctx.fill();
    vctx.globalAlpha = 1;
  }
/***********************
   *  Меню: C/С рекорды
   *  Обработка перенесена в основной keydown-listener
   ***********************/

/***********************
   *  Стартовая инициализация
   ***********************/
  // В меню мы не создаём игру сразу — только при старте.
  bindControlButtons();
  pal = colorSetForLevel();
  textures = buildTextures(pal);
  scheduleAmbient(0);

})();
